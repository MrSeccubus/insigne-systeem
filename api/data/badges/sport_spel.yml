slug: sport_spel
titel: Insigne Sport & Spel
introductie: |
  Dit insigne maakt deel uit van het activiteitengebied Sport & Spel.
  Sport & Spel is een activiteitengebied met heel veel mogelijkheden om zelf of samen met anderen te
  doen. Met dit insigne maak je kennis met enkele sporten die je nog niet kent en leer je zelf een spel- of
  sportactiviteit te organiseren.
eisen:
  - naam: Sporten
    eisen:
      - |
        Er zijn waarschijnlijk een heleboel sporten die je nog niet kent. Denk bijvoorbeeld aan Ultimate Frisbee of Flag Football.
        a. Zoek drie groepssporten die je nog niet kent en speel deze samen met je speltak. Leg ook uit waarom je voor deze sporten hebt gekozen.
      - |
        Het goed beheersen van een sport vergt oefening.
        a. Demonstreer een sport die je redelijk goed beheerst door de juiste technieken toe te passen en volgens de officiële spelregels te spelen.
      - |
        Sport valt of staat met begeleiding door goede trainers.
        a. Kies een sport waar jij je thuis in voelt en verzorg een sportworkshop of -training van minimaal één uur voor je eigen of een andere speltak.
  - naam: Spelen
    eisen:
      - |
        Wanneer je een wedstrijdspel speelt, is het belangrijk dat je het spel goed snapt en dat je slimme strategieën bedenkt.
        a. Speel met je vaste subgroep een strategisch spel, zoals een handelsspel, postenspel of levend stratego.
        b. Bedenk vooraf een strategie, waarbij alle leden van je vaste subgroep diens sterke punten inzet.
      - |
        Spellen spelen zorgt voor veel plezier en gezelligheid.
        a. Organiseer een spellendag of -opkomst met minimaal drie verschillende spellen voor je speltak. Kies bijvoorbeeld voor een postenspel, renspel, of binnenspellen zoals kaart- en bordspellen.
      - |
        Scouting is meer dan de wekelijkse opkomsten; er worden in de regio en landelijk regelmatig activiteiten georganiseerd.
        a. Meld je aan bij de organisatie van een regioactiviteit. Neem de leiding over ten minste één onderdeel, bereid deze zelfstandig voor en zorg voor de uitvoering.
  - naam: Bedenken
    eisen:
      - |
        Spellen spelen is niet alleen leuk, maar ook leerzaam!
        a. Maak een kwartetspel met onderwerpen over natuur en duurzaamheid.
        b. Maak aanvullend materiaal, zoals een uitlegboekje met spelregels of een eigen spelbord. Test het nieuwe spel met je speltak.
      - |
        Je kunt spellen bedenken voor verschillende speltakken.
        a. Zoek een spel dat te maken heeft met duurzaamheid of pas daarvoor een bekend spel aan.
        b. Geef speluitleg aan en speel het spel met je eigen of een andere speltak.
        c. Evalueer het spel na afloop met de leiding, aan de hand van tips en tops.
      - |
        Duurzaamheid is een belangrijk thema. Het is een mooie uitdaging om dit thema te integreren in je spellen.
        a. Organiseer een spellencircuit met ten minste vijf activiteiten gericht op duurzaamheid, geschikt voor minimaal 25 deelnemers. Regel, indien nodig, vrijwilligers om te helpen bij het begeleiden van de verschillende onderdelen.
        b. Evalueer het spel na afloop met de deelnemers en vrijwilligers.
        c. Onderzoek hoeveel materiaal en energie verbruikt zijn voorafgaand aan en tijdens het spellencircuit. Bedenk manieren om deze voetafdruk in de toekomst te laten verdwijnen.
  - naam: Spelleiding
    eisen:
      - |
        Een goede spelleider is belangrijk, zeker bij onbekende spellen.
        a. Zoek een sport of spel waar je speltak nog niet bekend mee is en bereid de uitleg voor. Zorg dat je eventuele vragen kunt beantwoorden.
        b. Leg je sport of spel uit aan je speltak zodat iedereen het begrijpt en neem daarna deel aan de activiteit.
      - |
        Een goede spelleider bereidt een spel goed voor én weet deelnemers enthousiast te maken.
        a. Organiseer het spel 'hints' door de speltak in twee of meer teams te verdelen. Elk team krijgt twee tot drie minuten om zonder spreken woorden uit te beelden die de anderen moeten raden. Bedenk zelf een lijst met te raden woorden.
        b. Vervul de rol van spelleider en jury gedurende het spel. Beheer de tijd en de score, en zorg ervoor dat de spelers gemotiveerd en betrokken blijven.
      - |
        Een goede spelleider heeft meer taken dan slechts het uitleggen van de regels.
        a. Bedenk een postenspel voor je hele speltak, in een bosrijke of stedelijke omgeving. Zoek vrijwilligers om op post te staan en verzorg zelf de centrale post.
        b. Bereid het spel goed voor, waarbij je rekening houdt met zaken als posten, materialen, versnaperingen en EHBO.
        c. Verdeel de deelnemers in groepjes en leg duidelijk de regels uit. Spreek ook af wanneer het spel begint en is afgelopen.
        d. Evalueer het spel na afloop met de deelnemers en de leiding, aan de hand van tips en tops.
  - naam: Extern
    eisen:
      - |
        Sporten is leuk en gezond! Je kunt zowel binnen als buiten Scouting sporten.
        a. Neem deel aan een sportactiviteit buiten je Scoutinggroep, zoals een sportdag, de Koningsspelen, of een activiteit bij een lokale sportvereniging of sporthal.
        b. Neem hiervan enkele foto's om te laten zien aan je speltak/leiding/ouders.
      - |
        Een sport wordt vaak extra spannend door een wedstrijd of competitie.
        a. Doe mee aan een sponsorwedstrijd voor een goed doel, zoals een hardloopwedstrijd, schoolvoetbaltoernooi, basketbaltoernooi, of schaaktoernooi.
      - |
        Als scout help je iedereen waar je kan. Daardoor kun je Scouting mooi op de kaart zetten.
        a. Leg contact met een externe organisatie zoals een school, buurthuis, of zorginstelling voor ouderen, en bied aan om een Scouting-spelmiddag te organiseren.
        b. Bereid de Scouting-spelmiddag grondig voor en regel indien nodig extra ondersteuning.
        c. Voer de geplande Scouting-spelmiddag uit voor de externe organisatie.
        d. Evalueer de spelmiddag achteraf samen met de deelnemers en begeleiders van de externe organisatie.
