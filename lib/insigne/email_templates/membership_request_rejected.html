<!DOCTYPE html>
<html lang="nl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"></head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:system-ui,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:2rem 1rem;">
    <tr><td align="center">
      <table width="100%" style="max-width:520px;background:#fff;border-radius:4px;border:1px solid #ddd;border-top:3px solid #e74c3c;padding:2rem;">
        <tr><td>
          <h1 style="margin:0 0 1.5rem;font-size:1.4rem;color:#1a1a1a;">Aanvraag afgewezen</h1>
          <p style="margin:0 0 1rem;color:#333;line-height:1.6;">Hoi {{ naam }},</p>
          <p style="margin:0 0 1.5rem;color:#333;line-height:1.6;">
            Je aanvraag om lid te worden van <strong>{{ group_name }}</strong>{% if speltak_name %} / <strong>{{ speltak_name }}</strong>{% endif %} is helaas afgewezen.
          </p>
          <p style="margin:0;color:#888;font-size:0.85rem;">
            Neem contact op met de groepsleider als je vragen hebt.
          </p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
