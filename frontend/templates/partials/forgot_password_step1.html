<p class="form-hint">Vul je e-mailadres in. We sturen een herstelcode als er een account bij ons staat.</p>
<form hx-post="/forgot-password" hx-target="#form-area" hx-swap="innerHTML">
    <div class="field">
        <label for="email">E-mailadres</label>
        <input type="email" id="email" name="email" required autofocus placeholder="jij@voorbeeld.nl">
    </div>
    <button type="submit" class="btn-primary">Herstelcode sturen</button>
</form>
<div class="auth-footer">
    <a href="/login">Terug naar inloggen</a>
</div>
