slug: water_sport_spel
titel: Insigne Water Sport & Spel
introductie: |
  Dit insigne maakt deel uit van het activiteitengebied Sport & Spel.
  Sport & Spel is een activiteitengebied met heel veel mogelijkheden om zelf of samen met anderen te
  doen. Met dit insigne maak je kennis met enkele sporten die je nog niet kent en leer je zelf een spel- of
  sportactiviteit te organiseren. Dit insigne is bedoeld om spelenderwijs kennis te maken met varen en het
  water. Je begint met leuke spelletjes en het wordt steeds serieuzer tot je zelf een wedstrijd op het water
  kunt organiseren. Dit insigne is speciaal bedoeld voor waterscouts, maar kunnen natuurlijk ook door
  andere scouts gedaan worden.
eisen:
  - naam: Op de kant
    eisen:
      - |
        Niveau 1.
        Waterpret!
        a. Zoek minimaal drie korte spelen met water op de kant of in ondiep water op in de activiteitenbank van Scouting.
        b. Bereid de spelen voor, leg ze uit en speel ze met je vaste subgroep of speltak (dit mag maar hoeft niet tijdens één opkomst).
      - |
        Niveau 2.
        Een spel kun je ook verwateren!
        a. Kies zelf een spel bedoeld voor op het land (of zoek er een op in de activiteitenbank van Scouting). Pas het spel aan zodat je het op of in het water kunt spelen.
        b. Speel het spel met minimaal twee subgroepen.
      - |
        Niveau 3.
        Bij een zeilwedstrijd is het belangrijk goed overzicht te hebben over het parcours.
        a. Maak een tekening van het wedstrijdparcours van een zeilwedstrijd voor lelievletten, valken of soortgelijke boten. Geef hier minimaal de windrichting, de vaarroute en boeien op aan. Houd hierbij rekening met veiligheidsregels in natuurgebieden en het niet verstoren van dieren.
  - naam: Regels
    eisen:
      - |
        Niveau 1.
        Bij een vaarwedstrijd moet je je aan de voorrangsregels en wedstrijdregels houden.
        a. Vaar met je kano door de sloot of langs de kant van een vaarwater en oefen daarbij de wedstrijdregels.
        b. Organiseer samen met je leiding situaties waarbij je in spelvorm met voorrangsregels te maken krijgt.
      - |
        Niveau 2.
        Om een zeilwedstrijd te kunnen organiseren moet je de regels goed kennen.
        a. Organiseer een zeilwedstrijd voor je speltak. Maak hierbij zoveel mogelijk gebruik van de wedstrijdbepalingen van de LSZW.
      - |
        Niveau 3.
        Een belangrijk onderdeel van het wedstrijdreglement is de procedure voor het indienen en afhandelen van protesten.
        a. Organiseer na afloop van een vaarwedstrijd een wedstrijdoverleg. Vorm daarbij twee groepen: een protesterende ploeg en een protestcommissie. Gebruik de officiële protestprocedure en het wedstrijdreglement van de LSZW. Gebruik hiervoor een situatie uit de eerder gevaren wedstrijd.
  - naam: Spelen
    eisen:
      - |
        Niveau 1.
        Meerdere spelen achter elkaar noemen we een spelencircuit.
        a. Neem deel aan een spelencircuit met minimaal vier spelen op het water. Eén van die spellen is een estafettespel met vaarmaterialen.
      - |
        Niveau 2.
        Bootonderdelen kunnen invloed hebben op de snelheid.
        a. Test tijdens het zeilen de invloed van verschillende onderdelen op de snelheid: zeillatten (aanwezig of niet), zwaard omhoog of omlaag bij verschillende koersen, zeilstand (aantrekken of vieren).
      - |
        Niveau 3.
        Een wedstrijd op het water kan ook in spelvorm!
        a. Organiseer een postenspel op het water met minimaal vier posten, voor de subgroepen van je speltak. Je begint met een kale vlet en verzamelt steeds meer onderdelen onderweg. Denk daarbij ook aan het vervoer van onderdelen, een reglement en de tijdsplanning.
  - naam: Wedstrijdvaren
    eisen:
      - |
        Niveau 1.
        Leren door doen! Van de eisen a en b kies je er één.
        a. Vaar mee als 'schipper' met een wedstrijd met kano's of een klein zeilbootje.
        b. Vaar mee met een wedstrijd met een lelievlet of soortgelijk vaartuig en probeer te winnen.
      - |
        Niveau 2.
        Om een zeilwedstrijd te kunnen winnen heb je goed tactisch inzicht nodig.
        a. Neem deel aan een zeilwedstrijd voor lelievletten of soortgelijke boten.
        b. Bestudeer vooraf het parcours van de wedstrijd.
        c. Bedenk een tactiek voor de zeilwedstrijd, bespreek deze vooraf met de bemanning en voer de tactiek uit als schipper aan boord.
      - |
        Niveau 3.
        Als ervaren wedstrijdzeiler kun je zelf ook wedstrijden organiseren.
        a. Neem de regels van de LSZW als basis. Kijk welke regels je wilt houden en welke regels je zou aanpassen (houd wel de reguliere veiligheidsregels aan).
        b. Maak een reglement met de aangepaste regels.
        c. Organiseer een wedstrijd met minimaal vier boten, met jouw nieuwe reglement. Jij bent de wedstrijdleider en zorgt ook voor een jury die goed geïnstrueerd wordt.
  - naam: Gemengde technieken
    eisen:
      - |
        Niveau 1.
        Een goede (water)scout beheerst verschillende technieken om zich op het water voort te bewegen.
        a. Leg een route af met minimaal drie verschillende duurzame technieken: kanoën, zeilen, roeien, zwemmen. Hier mag geen motor bij gebruikt worden.
      - |
        Niveau 2.
        Je kunt goed met een lelievlet overweg en beheerst verschillende technieken om de vlet voort te bewegen.
        a. Neem deel aan een gemengde race met een lelievlet (dat is een race waarbij je verschillende technieken moet gebruiken). Gebruik daarbij minimaal drie verschillende duurzame technieken: bijvoorbeeld roeien, zeilen, wrikken of jagen. Hier mag geen motor bij gebruikt worden.
      - |
        Niveau 3.
        Je bent van alle markten thuis!
        a. Neem deel aan een race met minimaal drie soorten schepen, waaronder een kano en een lelievlet. Daarbij moeten minimaal twee vaartechnieken gebruikt worden. De race moet minimaal één uur duren.
nawoord: |
  Veiligheid staat voorop! Bij zowel spel als wedstrijd is het handig om te kiezen voor vaarwater dat rustig
  is en weinig ander verkeer heeft. Ga in elk geval niet in de buurt van beroepsvaart varen. Spreek duidelijk
  af dat regulier verkeer voorrang heeft volgens de reguliere vaarregels (BPR). Raadpleeg de
  veiligheidsregels uit de Nautisch Technische Richtlijnen (NTR), met name op het gebied van
  reddingsvesten. Niveau 1 van dit insigne is zonder aanpassingen uitvoerbaar voor niet-waterscouts.
  Niveau 3 wordt ontraden voor niet-waterscouts vanwege het competitieve karakter.
  Raadpleeg ook de wedstrijdbepalingen van de Landelijke Stichting Zeilen voor Waterscouts (LSZW).
