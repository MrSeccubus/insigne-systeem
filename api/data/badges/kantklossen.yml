slug: kantklossen
titel: Insigne Kantklossen
introductie: |
  Kantklossen is een eeuwenoude ambachtelijke techniek waarbij je met klossen draad patronen vlecht.
eisen:
  - naam: Kennismaken
    eisen:
      - |
        Wat is kantklossen?
        a. Zoek uit wat kantklossen is en wanneer het ontstaan is.
        b. Bekijk voorbeelden van kant en beschrijf wat je mooi vindt.
        c. Vertel aan je groep wat je hebt geleerd.
      - |
        Gereedschap en materiaal.
        a. Noem de benodigde materialen voor kantklossen.
        b. Laat zien hoe je klossen opwikkelt.
        c. Maak je werkplek klaar om te beginnen.
      - |
        Eerste patronen.
        a. Leer het eenvoudigste basispatroon.
        b. Oefen het patroon minimaal vijf keer.
        c. Laat het resultaat zien aan een (bege-)leider.
  - naam: Oefenen
    eisen:
      - |
        Herhaling is de moeder van alle leren.
        a. Maak een patroon van minimaal tien centimeter.
        b. Vertel wat je moeilijk vond.
        c. Wat wil je de volgende keer beter doen?
      - |
        Een nieuw patroon.
        a. Kies een nieuw patroon uit een patroonboek.
        b. Maak het patroon na.
        c. Beschrijf het verschil met het eerste patroon.
      - |
        Fouten herstellen.
        a. Maak bewust een fout in je patroon.
        b. Herstel de fout zonder opnieuw te beginnen.
        c. Leg uit hoe je de fout hebt hersteld.
  - naam: Verdiepen
    eisen:
      - |
        Kleur en vorm.
        a. Gebruik twee kleuren draad in een patroon.
        b. Maak een patroon met een gebogen lijn.
        c. Beschrijf hoe kleur het ontwerp beïnvloedt.
      - |
        Eigen ontwerp.
        a. Teken een eigen patroon op papier.
        b. Maak het patroon op de klos.
        c. Presenteer het resultaat aan de groep.
      - |
        Geschiedenis.
        a. Zoek uit in welke streken kantklossen populair was.
        b. Vergelijk twee regionale stijlen.
        c. Maak een kort verslag.
  - naam: Delen
    eisen:
      - |
        Leer een ander.
        a. Leg een beginnersstap uit aan een groepsgenoot.
        b. Begeleid diegene bij de eerste tien minuten.
        c. Geef feedback op wat goed ging.
      - |
        Tentoonstelling.
        a. Verzamel drie eigen werkstukken.
        b. Schrijf bij elk werkstuk een korte toelichting.
        c. Stel de werkstukken tentoon voor de groep.
      - |
        Materialen vergelijken.
        a. Probeer kantklossen met twee verschillende draden.
        b. Beschrijf het verschil in gevoel en resultaat.
        c. Welk materiaal heeft je voorkeur en waarom?
  - naam: Meester worden
    eisen:
      - |
        Groot project.
        a. Kies een project dat minimaal een uur werk vraagt.
        b. Maak het project af.
        c. Presenteer het eindresultaat met een korte uitleg.
      - |
        Doorgeven.
        a. Geef een korte les kantklossen aan scouts van een jongere speltak.
        b. Maak een eenvoudige instructiekaart die zij kunnen bewaren.
        c. Evalueer de les: wat werkte goed, wat zou je anders doen?
      - |
        Reflectie.
        a. Beschrijf wat kantklossen je heeft geleerd over geduld en precisie.
        b. Welke vaardigheid uit kantklossen kun je in het dagelijks leven gebruiken?
        c. Wat zou je nog willen leren op het gebied van kantklossen?
nawoord: |
  Kantklossen verbindt traditie met creativiteit. Met dit insigne heb je niet alleen een vaardigheid geleerd, maar ook een stukje ambachtelijk erfgoed bewaard.
