slug: jaarinsigne_2026
titel: Jaarinsigne 2026 - Nieuwe Insignes
introductie: |
  In september 2025 is een nieuw insignepakket voor de hele vereniging geïntroduceerd. Met het jaarinsigne 2026 kun je op een creatieve manier ‘proeven’ van de nieuwe insignes. Je kiest zelf de insigne-eisen uit die je wilt doen en dat mogen insigne-eisen zijn van verschillende insignes. Voor elke leeftijdsgroep geldt een minimum aantal punten dat je moet halen om het jaarinsigne 2026 te verdienen. 

  De nieuwe insignes hebben elk 3 niveaus: een insigne-eis op niveau 1 (geel) = 1 punt, op niveau 2 (oranje) = 2 punten en op niveau 3 (paars) = 3 punten. Sommige insigne eisen zijn groen gekleurd en hebben te maken met duurzaamheid. Dit noemen we de groene lijn in het nieuwe insignepakket. Alle insignes, insigne-eisen en hoe het nieuwe insignepakket werkt kun je vinden op de Activiteitenbank: [https://activiteitenbank.scouting.nl/](https://activiteitenbank.scouting.nl/)

  ## Bevers 5-7 jaar

  Wil je met de bevers kennismaken met de nieuwe insignes? Je kunt met je leidingteam zelf bepalen hoeveel punten de bevers moeten halen om het jaarinsigne te verdienen. We adviseren twee á drie insigne-eisen op niveau 1 (geel), afhankelijk van wat de bevers op hun leeftijd aankunnen.

  Waarvan:
  -   Minimaal één groene insigne-eis. 

  ## Welpen 7-11 jaar

  Haal minimaal vijf insignepunten. Je kunt insigne-eisen uit verschillende niveaus kiezen. Bijvoorbeeld  vijf insigne-eisen op niveau 1 (geel) of drie insigne-eisen op niveau 1 en één insigne-eis op niveau 2, etc.

  Waarvan:
  -    Minimaal één groene insigne-eis.
  -    Kies insigne- eisen van min. twee verschillende insignes.

  ## Scouts 11-15 jaar  

  Haal minimaal acht insignepunten. Je kunt insigne-eisen uit verschillende niveaus kiezen.

  Waarvan:
  -    Minimaal één groene insigne-eis en 
  -    minimaal één insigne-eis op niveau 2 (oranje). 
  -    Kies insigne-eisen van min. twee verschillende insignes. 
  
  ## Explorers 15-18 jaar

  Haal minimaal tien insignepunten. Je kunt insigne-eisen uit verschillende niveaus kiezen.

  Waarvan:
  -    Minimaal één groene insigne- eis en
  -    minimaal één insigne-eis op niveau 2 (oranje) en
  -    minimaal één insigne- eis  op niveau 3 (paars).  
  -    Kies insigne-eisen van min. drie verschillende insignes.

  ## Roverscouts 18-21 jaar

  Haal minimaal twaalf insignepunten. Je kunt insigne-eisen uit verschillende niveaus kiezen.

  Waarvan:
  -    Minimaal twee groene insigne-eisen en
  -    Minimaal twee insigne-eisen op niveau 2 (oranje) en
  -    Minimaal één insigne-eis opniveau 3 (paars). 
  -    Kies insigne-eisen van min. drie verschillende insignes. 


  ## Tips: 
  - Doordat het nieuwe insignepakket voor de hele vereniging hetzelfde is, kun je met het jaarinsigne 2026 de kennismaking met het nieuwe insignepakket ook combineren in een gezamenlijk groepsweekend.  
  - Elke groep heeft een gratis insigneposter ontvangen. Heb je die gemist? Dan kun je deze samen met de toelichting downloaden op: [https://activiteitenbank.scouting.nl/insignes-en-badges/hoe-werkt-het](https://activiteitenbank.scouting.nl/insignes-en-badges/hoe-werkt-het).
  - Alle insignes, inclusief het jaarinsigne, zijn verkrijgbaar bij de [ScoutShop](https://www.scoutshop.nl/voor-scouts/badges-en-insignes/vaardigheidsinsignes). 

