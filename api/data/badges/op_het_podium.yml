slug: op_het_podium
titel: Insigne Op het podium
introductie: |
  Dit insigne maakt deel uit van het activiteitengebied Expressie.
  In dit activiteitengebied doe je activiteiten waarmee je je kunt uitdrukken, zoals dansen, filmen,
  handvaardigheid, toneelspelen, muziek maken en schrijven. Met dit insigne ga je aan de slag met
  activiteiten waarmee je jezelf tijdens een voorstelling of op een podium kunt laten zien.
eisen:
  - naam: Toneelspel
    eisen:
      - |
        Niveau 1.
        Met toneelspel kun je heel goed een boodschap overbrengen.
        a. Verzin een reclame over het hergebruiken (recyclen) van spullen of verpakkingsmaterialen en presenteer dat aan je speltak. Je mag andere leden van je speltak vragen met je mee te doen.
      - |
        Niveau 2.
        Durf te improviseren en laat je fantasie de vrije loop!
        a. Zoek uit waar het theatersportprincipe 'LEF' voor staat.
        b. Doe met z'n tweeën of drieën een improvisatietoneelstukje volgens de principes van theatersport. Je vraagt het publiek om een beroep, locatie en voorwerp en verzint samen het verhaal.
        c. Extra uitdaging: als een leider 'change' roept, vervang je de laatste zin en vervolg je het verhaal vanuit daar.
      - |
        Niveau 3.
        Toneelspel is het meest overtuigend en meeslepend als het hele plaatje klopt.
        a. Zoek op wat de theatertermen spanningsboog, mimiek, cue en vlakverdeling betekenen en waarom die belangrijk zijn.
        b. Doe een podiumoptreden waarbij je een sketch, toneelstuk of presentatie voordraagt in een rol. Besteed aandacht aan de aankleding van het podium, jezelf en eventueel schmink.
  - naam: Verhalen vertellen
    eisen:
      - |
        Niveau 1.
        Je kunt een verhaal vertellen door het uit te beelden, zonder woorden.
        a. Verzin een kort verhaal om milieuvervuiling tegen te gaan en beeld dat in maximaal 1 minuut uit in een sketch tijdens een opkomst, weekend of kamp.
        b. Speel het verhaal drie keer: één keer boos, één keer blij en één keer verdrietig.
      - |
        Niveau 2.
        Er zijn verschillende manieren om een verhaal te vertellen.
        a. Zoek minimaal zes verschillende technieken op die je kunt gebruiken om een verhaal te vertellen.
        b. Kies drie technieken uit die je toepast in een verhaal over duurzaamheid dat je vertelt of voordraagt aan je speltak.
        c. Vraag tips en tops aan de leden van je speltak.
        d. Vertel een deel van het verhaal nog een keer en gebruik daarbij de verbetertips.
      - |
        Niveau 3.
        Een verhaal goed voordragen is een kunst.
        a. Schrijf een monoloog over duurzaamheid en draag dit voor als verhaal of kampvuursketch, waarbij je rekening houdt met de opbouw en de spanningsboog.
  - naam: Dansen
    eisen:
      - |
        Niveau 1.
        Door samen te dansen kun je zonder woorden veel plezier maken met elkaar.
        a. Leer je speltak of je vaste subgroep een bestaand dansje en voer het op.
      - |
        Niveau 2.
        Dansen is soms ook improviseren!
        a. Bedenk een dans(je) van minimaal één minuut op een bestaande melodie, oefen dat met je vaste subgroep en voer het op voor je hele speltak.
        b. Leer het dansje aan andere leden van je speltak.
      - |
        Niveau 3.
        Dansen is van alle tijden. Zo zijn er allerlei verschillende klassieke en moderne dansstijlen.
        a. Verwerk minimaal drie verschillende dansstijlen in een toneelstuk, verhaal of sketch, waarbij je gebruikmaakt van een medley van verschillende muziekstukken. Bij elk muziekstuk heb je een bijpassende dansstijl.
        b. Voer het dansstuk op voor een breder publiek, bijvoorbeeld voor de hele groep of alle ouders/verzorgers.
  - naam: Zingen
    eisen:
      - |
        Niveau 1.
        Zingen is gezond!
        a. Kies een bekend lied dat je leuk vindt om mee te zingen en zorg ervoor dat je hele speltak de songtekst heeft.
        b. Vertel waarom je dit lied hebt uitgekozen.
        c. Zing het lied alleen of met een groepje voor. Laat daarna iedereen meezingen.
      - |
        Niveau 2.
        Samen zingen verbindt mensen!
        a. Kies een canon en leid deze met je speltak. Verdeel de groep in subgroepen, geef de maat aan en start en stop de groepen op het juiste moment.
        b. Zoek een lied uit dat je alleen of met begeleiding aan je speltak voordraagt. Leg uit waarom je dit lied gekozen hebt.
      - |
        Niveau 3.
        In iedereen schuilt een ster!
        a. Organiseer een karaokeparty met beeld en geluid voor je speltak of groep.
        b. Zorg voor uitnodigingen en oefen zelf minstens drie liedjes om te zingen.
        c. Presenteer de avond. Kondig de kandidaten enthousiast aan en introduceer de optredens met flair.
  - naam: Presenteren
    eisen:
      - |
        Niveau 1.
        Als presentator ben jij hét gezicht van de show. Maak een keuze tussen eis a of b.
        a. Presenteer tijdens een opkomst, groepsactiviteit of kampvuuravond een activiteit met sketches of optredens. Kondig elk optreden aan, sluit het af en bedank aan het eind iedereen die meedeed en keek.
        b. Doe alsof je leiding bent en presenteer een spel of verhaal aan je speltak. Bespreek je presentatie van tevoren met de leiding. Vraag na afloop of je speltak vond dat je het duidelijk hebt gepresenteerd.
      - |
        Niveau 2.
        Als presentator leid je het programma.
        a. Presenteer het programma en de activiteiten tijdens een kampvuur- of ouderavond. Zorg voor een verhaallijn, attributen en een verzorgde presentatie. Let op je uiterlijk, stemgebruik en houding.
      - |
        Niveau 3.
        Presenteren is ook organiseren.
        a. Bereid een kampvuuravond voor en leid het programma. Denk aan locatie, materialen en taakverdeling.
        b. Maak een planning met liedjes, introduceer sketches of andere activiteiten en zorg voor een doorlopend verhaal in de avond.
        c. Zorg dat iedereen weet wat er van hen verwacht wordt.
        d. Let tijdens het presenteren van het kampvuur op je houding, je uiterlijk en hoe je je stem gebruikt. Wissel zachte en energieke manier van presenteren met elkaar af.
        e. Rond de avond af door iedereen te bedanken en afspraken te maken over opruimen.
