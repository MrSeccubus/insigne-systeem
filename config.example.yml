# Insigne Systeem — example configuration.
#
# Copy this file to `config.yml` (the real file is gitignored) and fill in
# your own values:
#
#     cp config.example.yml config.yml
#
# The app reads `config.yml` from the working directory on startup. Override
# the path with the INSIGNE_CONFIG environment variable.

database:
  # SQLite is created automatically on first run; schema is managed by Alembic.
  url: sqlite:///api/data/insigne.db

jwt:
  secret_key: "CHANGE-ME-to-any-long-random-string"
  algorithm: HS256
  expire_days: 30

# ─────────────────────────────────────────────────────────────────────────────
# Public URL of the site. Used in outgoing e-mail links AND as the trusted
# origin for the CSRF Origin/Referer check (api/main.py:origin_csrf_check).
#
# IMPORTANT — must EXACTLY match the origin the browser shows in the address
# bar: scheme + host, no trailing slash, no port for 443. The CSRF check
# compares the browser's `Origin` header against this string byte-for-byte; any
# mismatch is rejected with 403 *before* the handler runs (so e.g. a failed
# registration also sends no e-mail).
#
# Pick ONE canonical host and redirect the other at your proxy. The classic
# trap behind a reverse proxy is www vs the bare apex:
#   - base_url here is the apex `https://insignesysteem.nl`, so the proxy must
#     301-redirect `www.insignesysteem.nl` → the apex. Otherwise visitors on
#     `https://www.insignesysteem.nl` send a non-matching Origin and get 403.
#   - If you prefer www, set base_url to `https://www.insignesysteem.nl` and
#     redirect the apex → www instead.
# Also force http → https at the proxy, or an http Origin won't match.
#
# Deploy at the ROOT of a (sub)domain — e.g. `https://insigne.scouting.nl` —
# NOT under a sub-path like `https://scouting.nl/insigne/`. The app uses
# root-absolute URLs throughout (links, redirects, the service-worker scope and
# its cached asset list), so a path prefix is not supported. Use a subdomain
# and point the reverse proxy at the app's root.
# ─────────────────────────────────────────────────────────────────────────────
base_url: "https://insignesysteem.nl"

server:
  host: 127.0.0.1   # bind address for run_prod.sh (default: 127.0.0.1)
  port: 8000        # bind port for run_prod.sh (default: 8000)
  keepalive: 2      # uvicorn --timeout-keep-alive seconds (set low behind a proxy)
  # Trusted proxy IPs (uvicorn --forwarded-allow-ips). Empty = ignore
  # X-Forwarded-* (safe default when nothing is in front). Set to the proxy's
  # IP (e.g. "127.0.0.1") when behind nginx / Apache so the app logs the real
  # client IP — required for the failed-login WARNING (issue #130) to be useful
  # to fail2ban. NOTE: this does NOT affect the CSRF check above.
  forwarded_allow_ips: ""

# Outgoing e-mail (registration confirmations, password resets, sign-off
# notifications). Leave smtp_host empty to disable sending.
email:
  smtp_host: "smtp.example.com"
  smtp_port: 587
  username: "noreply@insignesysteem.nl"
  password: "CHANGE-ME"
  from_address: "noreply@insignesysteem.nl"
  from_name: "Insigne Systeem"
  security: "starttls"   # starttls | ssl | none
  templates_dir: ""      # optional: path to custom e-mail templates

# System administrators (by e-mail address — config is the source of truth,
# not the database).
admins:
  - admin@example.com

# Whether any authenticated user may create a group (false = only admins).
allow_any_user_to_create_groups: true

# Rate limiting on the e-mail-sending endpoints. Values are "limits"-library
# strings: "<count>/<period>", where period is second|minute|hour|day
# (e.g. "5/hour", "10/minute", "3/day").
#
# register / forgot_password / contact are the unauthenticated forms (inbox
# bombing, contact spam) and key on the client IP (request.client.host).
# Behind a reverse proxy that is only the *real* client IP when
# server.forwarded_allow_ips is set (uvicorn then rewrites it from
# X-Forwarded-For) — otherwise every request looks like it comes from the
# proxy and shares one bucket. Same dependency as the fail2ban login log
# above.
#
# signoff covers the by-email sign-off request endpoints: authenticated, but
# they mail an arbitrary address on the scout's behalf. This one keys on the
# logged-in *user* (not IP), so a shared household/venue connection never
# shares a bucket. The batch sign-off panel sends one request per eis, so
# keep this comfortably above the largest niveau's eisen count.
rate_limit:
  enabled: true
  register: "5/hour"
  forgot_password: "5/hour"
  contact: "10/hour"
  signoff: "15/hour"

# ALTCHA proof-of-work captcha on the unauthenticated forms (/register and
# /contact). Self-hosted and privacy-friendly: no cookies, no fingerprinting,
# no third-party calls. The browser widget solves a small proof-of-work signed
# with a key derived from jwt.secret_key.
#
# REQUIREMENTS in the visitor's browser:
#   * JavaScript enabled.
#   * A SECURE CONTEXT — the widget uses the Web Crypto API (crypto.subtle),
#     which browsers only expose over HTTPS or on http://localhost /
#     http://127.0.0.1. Over plain HTTP to a LAN IP or hostname it fails with
#     "Web Crypto is not available. Secure context is required." Since you
#     should serve this app over HTTPS in production anyway (see base_url /
#     the http->https note), that's the supported setup; for local testing use
#     http://localhost:8000 rather than the machine's IP.
# Set enabled: false if a secure context or JavaScript is not available to your
# audience (then rely on the rate_limit above).
#
# ``complexity`` is the ALTCHA max_number (upper bound of the number the client
# brute-forces); higher = more bot cost but slightly slower for real users.
captcha:
  enabled: true
  complexity: 100000
