slug: koken
titel: Insigne Koken
introductie: |
  Dit insigne maakt deel uit van het activiteitengebied Veilig & Gezond.
  Het activiteitengebied Veilig & Gezond gaat over activiteiten rondom voeding en veiligheid. Met dit insigne
  leer je hoe je op verschillende manieren voedsel en maaltijden kan bereiden op een verantwoorde en
  gezonde manier.
eisen:
  - naam: Voorbereiding en koken
    eisen:
      - |
        Niveau 1.
        Lekker en gezond koken begint met een goede voorbereiding.
        a. Verzin een gezond en lekker avondmenu. Maak een boodschappenlijst, help mee met inkopen, koken én afwassen.
        b. Maak zelf koekjes voor je speltak. Zoek een recept, koop de ingrediënten en gebruik (onder begeleiding) de oven.
      - |
        Niveau 2.
        Gevarieerd eten is belangrijk voor een goede gezondheid.
        a. Verzin een complete maaltijd met voor-, hoofd- en nagerecht op basis van de Schijf van Vijf voor je vaste subgroep. Houd rekening met diëten, allergieën en overtuigingen.
        b. Maak een boodschappenlijst, houd je aan het budget, doe de boodschappen en bereid de maaltijd samen met je vaste subgroep.
        c. Maak een receptenboekje met deze maaltijd en vier andere kamprecepten.
        d. Bak een taart en laat die proeven aan je vaste subgroep of speltak.
      - |
        Niveau 3.
        Samen eten is in veel culturen een belangrijk onderdeel bij het vieren van feesten.
        a. Organiseer een feestmaaltijd (voor-, hoofd- en nagerecht) voor minstens tien personen, met ingrediënten uit alle schijven van de Schijf van Vijf.
        b. Verzin een thema voor het feestmaal, maak menukaarten en aankleding.
        c. Stel een budget op, doe de boodschappen, maak een kookdraaiboek en bereid de maaltijd samen met je vaste subgroep.
        d. Maak drie soorten gebak of lekkernijen en organiseer een proeverij voor je speltak.
  - naam: Primitief koken
    eisen:
      - |
        Niveau 1.
        Op een vuurtje kun je een lekkere avondsnack maken!
        a. Bereid een eenvoudige snack op houtvuur, zoals popcorn, een hotdog of een chocoladebanaan.
      - |
        Niveau 2.
        Op kamp of in de natuur heb je niet altijd de beschikking over een fornuis of kookplaat.
        a. Kook of bak (een deel van) een maaltijd op een alternatieve warmtebron, zoals houtvuur, primus, Esbit, barbecue of zelfgemaakte oven.
      - |
        Niveau 3.
        Als je in de natuur op kamp of hike bent, is het handig om op alternatieve manieren maaltijden te kunnen bereiden.
        a. Bereid één dag alle maaltijden (ontbijt, lunch, snacks en avondeten) met primitieve technieken, zoals een Dutch oven, het roken van voedsel, solarcooking, houtvuur of zelfgebouwde ovens. Gebruik meerdere technieken gedurende de dag.
  - naam: Voedselproductie
    eisen:
      - |
        Niveau 1.
        Veel groenten en fruit zijn het hele jaar te koop in de supermarkt, maar het oogsten is aan seizoenen gebonden.
        a. Zoek van tien groente- of fruitsoorten uit in welk seizoen ze geoogst worden en leg uit waarom het goedkoper en duurzamer is om ze in het bijpassende seizoen te kopen.
        b. Kweek thuis een eetbaar plantje of kruiden en laat het resultaat zien aan je speltak.
      - |
        Niveau 2.
        Sommige voedingsmiddelen leggen een lange weg af voordat ze van producent op je bord terechtkomen.
        a. Zoek voor vijf producten uit hoe ze van producent bij de consument terechtkomen. Onderzoek daarbij wat 'biologisch geproduceerd' betekent en wat de voordelen daarvan zijn.
        b. Presenteer je bevindingen aan je speltak.
      - |
        Niveau 3.
        De manier waarop je met voedsel omgaat heeft invloed op je ecologische voetafdruk.
        a. Bedenk hoe je je ecologische voetafdruk kunt verkleinen door je eetpatroon aan te passen. Probeer dit een maand en presenteer het resultaat aan je speltak.
        b. Maak drie nieuwe gerechten met restjes van eerdere maaltijden. Denk aan soep, loempia of roerei.
  - naam: Ingrediënten
    eisen:
      - |
        Niveau 1.
        De Schijf van Vijf is een bekend hulpmiddel van het Voedingscentrum om gevarieerd en gezond te eten.
        a. Leg uit wat de Schijf van Vijf is en waarom het belangrijk is om je eraan te houden.
        b. Maak een quiz over gezond eten of ingrediënten uit verschillende landen met minimaal twaalf vragen en speel de quiz met je speltak of je ouders.
      - |
        Niveau 2.
        Meten is weten!
        a. Houd een week lang bij wat je eet. Geef aan wat aansluit bij de Schijf van Vijf, wat je te veel of te weinig eet, en wat erbuiten valt.
        b. Maak een weekmenu met een goede verdeling en volg dit minimaal een week. Vertel na afloop hoe dat ging en wat je ervan vond.
      - |
        Niveau 3.
        Op elk samengesteld product moet een etiket met ingrediënten staan.
        a. Bestudeer de etiketten van vijf producten die je vaak eet. Beschrijf de ingrediënten en leg uit wat eventuele E-nummers betekenen.
        b. Zoek uit wat conserveermiddelen zijn en wat de voor- en nadelen ervan zijn.
        c. Leg uit hoe je weet of iets bedorven is.
        d. Leg het verschil uit tussen 'ten minste houdbaar tot' en 'te gebruiken tot'.
  - naam: Kooktechnieken
    eisen:
      - |
        Niveau 1.
        Om veilig te kunnen koken moet je weten hoe je met keukengerei en -apparatuur omgaat.
        a. Verzamel thuis keukengerei en leg uit waar je het voor gebruikt.
        b. Leg uit waarom je je handen moet wassen voor én tijdens het koken.
        c. Laat zien hoe je veilig omgaat met een gasstel, kookplaat en oven.
        d. Laat zien dat je de volgende acties kunt uitvoeren: eieren, groente, pasta, rijst of aardappelen koken; iets bakken in de pan; iets bakken in de oven.
      - |
        Niveau 2.
        Lekker, verantwoord én duurzaam snacken: dat kan ook door te frituren!
        a. Zoek uit wat de voor- en nadelen zijn van frituren in olie en bereiden in een airfryer. Geef ook aan welke duurzame olie je het best kunt gebruiken als je toch frituurt.
        b. Maak een (vegetarische) snack, zoals een loempia, bitterbal, kroket of frikandel en bereid deze zonder vet, in een airfryer.
        c. Verzorg een volledig vetvrije, gezonde maaltijd, waarbij je enkel gebruik maakt van een airfryer of oven.
      - |
        Niveau 3.
        Bij barbecueën komen veel kooktechnieken samen.
        a. Leer de verschillende technieken van barbecueën: direct grillen, indirect grillen en roken. Leg uit wanneer je welke methode gebruikt.
        b. Onderzoek welke invloed verschillende houtsoorten hebben op de smaak bij barbecueën. Experimenteer met een rooktechniek en leg uit wat je merkt aan de smaak.
        c. Laat zien hoe je een barbecue veilig opstart en beheert, inclusief temperatuurregeling door ventilatie of het toepassen van zones.
        d. Bereid een complete barbecuemaaltijd waarbij je minimaal twee kooktechnieken gebruikt.
