{% extends "base.html" %}

{% block title %}Mijn profiel — Insigne Systeem{% endblock %}

{% block content %}
<main>
    <h1>Mijn profiel</h1>
    {% if success %}
        <p class="form-success">{{ success }}</p>
    {% endif %}
    <div style="max-width:480px;">
        <form method="post" action="/profile">
            {% if error %}
                <p class="form-error">{{ error }}</p>
            {% endif %}
            <div class="field">
                <label for="name">Naam</label>
                <input type="text" id="name" name="name" value="{{ current_user.name }}" autocomplete="name">
            </div>
            <div class="field">
                <label for="email">E-mailadres</label>
                <input type="email" id="email" name="email" value="{{ current_user.email }}" required autocomplete="email">
            </div>
            <div class="field" x-data="{ show: false }">
                <label for="password">Nieuw wachtwoord <span class="optional">(leeg laten om ongewijzigd te laten)</span></label>
                <div class="field-password">
                    <input :type="show ? 'text' : 'password'" id="password" name="password"
                           autocomplete="new-password" minlength="8">
                    <button type="button" class="btn-show-password" @click="show = !show"
                            x-text="show ? 'Verbergen' : 'Tonen'"></button>
                </div>
                <span class="field-hint">Minimaal 8 tekens.</span>
            </div>
            <button type="submit" class="btn-primary">Opslaan</button>
        </form>
    </div>
</main>
{% endblock %}
