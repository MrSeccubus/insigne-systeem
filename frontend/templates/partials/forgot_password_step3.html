{% if error %}
<p class="form-error">{{ error }}</p>
{% endif %}
<p class="form-hint">Kies een nieuw wachtwoord.</p>
<form hx-post="/forgot-password/reset" hx-target="#form-area" hx-swap="innerHTML">
    <input type="hidden" name="setup_token" value="{{ setup_token }}">
    <div class="field" x-data="{ show: false }">
        <label for="password">Nieuw wachtwoord</label>
        <div class="field-password">
            <input :type="show ? 'text' : 'password'" id="password" name="password" required autofocus autocomplete="new-password" minlength="8">
            <button type="button" class="btn-show-password" @click="show = !show" x-text="show ? 'Verbergen' : 'Tonen'"></button>
        </div>
        <span class="field-hint">Minimaal 8 tekens.</span>
    </div>
    <button type="submit" class="btn-primary">Wachtwoord opslaan</button>
</form>
