{% if error %}
<p class="form-error">{{ error }}</p>
{% endif %}
<p class="form-hint">Als er een account is voor <strong>{{ email }}</strong>, hebben we een herstelcode gestuurd.</p>
<form hx-post="/forgot-password/confirm" hx-target="#form-area" hx-swap="innerHTML">
    <input type="hidden" name="email" value="{{ email }}">
    <div class="field">
        <label for="code">Herstelcode</label>
        <input type="text" id="code" name="code" required autofocus autocomplete="one-time-code" spellcheck="false">
    </div>
    <button type="submit" class="btn-primary">Code bevestigen</button>
</form>
