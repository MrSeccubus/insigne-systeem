slug: knopen
titel: Insigne Knopen
introductie: |
  Dit insigne maakt deel uit van het activiteitengebied Uitdagende Scoutingtechnieken.
  In dit activiteitengebied doe je activiteiten rondom een techniek, zoals hakken, stoken, kaart en kompas,
  routetechnieken, pionieren, zeilen en kamperen. Met het insigne Knopen leer je alles over knopen, materiaal en
  onderhoud. De knopen die je leert kan je onder andere gebruiken bij het pionieren of bij het varen op het water.
eisen:
  - naam: Knopen leggen
    eisen:
      - |
        Niveau 1.
        Met basiskennis van knopen kom je al aardig uit de voeten op het land en water.
        a. Leg de volgende knopen: mastworp, platte knoop, schootsteek, halve steek, slipsteek, paalsteek, achtknoop, timmersteek, vriendschapsknoop, apenvuistje, kikker beleggen.
      - |
        Niveau 2.
        Als geoefende scout beheers je de meest voorkomende knopen en kun je ze toepassen.
        a. Leg de volgende knopen: mastworp met voor- of naslag, dubbele slippende schootsteek met knevel, derdehandsteek, vrachtrijdersteek, dubbele achtknoop/teruggestoken achtknoop, marlsteek, tuisteek/rondtorn, werpankersteek, werplijnknoop, scheerlijnknoop, turkse knoop.
        b. Knoop een fluitkoord.
      - |
        Niveau 3.
        Als knopenspecialist beheers je natuurlijk ook de meer specialistische knopen.
        a. Leg de volgende knopen: trompetsteek, prussik, karaaksteek/dubbele hielingssteek, tonsteek, chirurgenknoop, vissersknoop, vlinderknoop, dubbele paalsteek, bunny-ears, constrictorknoop.
        b. Maak een knopenbord met vijftien verschillende sierknopen.
  - naam: Knopenkennis
    eisen:
      - |
        Niveau 1.
        Een goede kennis van knopen is de basis om ze goed te kunnen toepassen.
        a. Leg uit waar je de volgende knopen voor gebruikt en wat de voor- en nadelen zijn: mastworp, platte knoop, schootsteek, halve steek, slipsteek, paalsteek, achtknoop, timmersteek, vriendschapsknoop, apenvuist, kikker beleggen.
      - |
        Niveau 2.
        Je hebt ruime kennis over knopen en kunt dat met anderen delen.
        a. Leg uit waar je de volgende knopen voor gebruikt en wat de voor- en nadelen zijn: mastworp met voor- of naslag, dubbele slippende schootsteek met knevel, derdehandsteek, vrachtrijdersteek, dubbele achtknoop, marlsteek, tuisteek/rondtorn, werpankersteek, werplijnknoop, scheerlijnknoop, turkse knoop.
      - |
        Niveau 3.
        Je bent specialist in het gebruik van knopen en kunt ook enkele knopen aan anderen leren.
        a. Leg uit waar je de volgende knopen voor gebruikt en wat de voor- en nadelen zijn: trompetsteek, prussik, karaaksteek/dubbele hielingssteek, tonsteek, chirurgenknoop, vissersknoop, vlinderknoop, dubbele paalsteek, bunny-ears, constrictorknoop.
        b. Help scouts van je eigen of een andere speltak bij het leren van minimaal twee knopen.
  - naam: Materiaalkennis
    eisen:
      - |
        Niveau 1.
        Kennis van materiaal is belangrijk om touwen goed te kunnen gebruiken.
        a. Leg uit wat het verschil is tussen natuurlijk touw en kunststof/synthetisch touw.
        b. Herken een eindsplits, oogsplits en bezetting met takelgaren.
      - |
        Niveau 2.
        Je weet hoe een touw in elkaar zit en hoe het wordt gemaakt.
        a. Vertel wat de verschillende onderdelen van een touw zijn en leg uit wat de termen kabelslag en wantslag betekenen.
        b. Sla met behulp van deze kennis je eigen touw (touwslaan).
        c. Laat zien hoe een marlpriem en een splitsijzer werken.
      - |
        Niveau 3.
        Je bent bekend met de meest voorkomende touwsoorten die bij Scouting worden gebruikt.
        a. Leg uit waaraan je de volgende touwsoorten herkent en wat de eigenschappen ervan zijn: manilla, sisal, hennep, (geruwd) polypropyleen, polyethyleen, polyester.
  - naam: Onderhoud en duurzaamheid
    eisen:
      - |
        Niveau 1.
        Touwen die goed onderhouden en bewaard blijven gaan langer mee.
        a. Laat zien hoe je touwen schoonmaakt.
        b. Laat zien hoe je touwen opschiet en opbergt.
      - |
        Niveau 2.
        Touwen die stuk gaan hoef je niet zomaar weg te gooien, maar kun je meestal opnieuw gebruiken.
        a. Repareer een touw met één van de volgende technieken: eindsplits, oogsplits, bezetting met takelgaren.
      - |
        Niveau 3.
        Goed onderhoud maar ook de keuze voor het soort materiaal zijn belangrijk voor duurzaam gebruik.
        a. Maak een eenvoudige takeling.
        b. Leg uit welke soorten touw het minst schadelijk zijn voor het milieu.
        c. Zet je in om touw zo veel mogelijk te hergebruiken binnen je groep. Maak hiervoor een poster of bespreek het op de groepsraad.
  - naam: Veiligheid
    eisen:
      - |
        Niveau 1.
        Veiligheid staat voorop!
        a. Leg uit waarom je uit de buurt moet blijven van touw waar spanning op gezet wordt (zoals bij een kabelbaan of touwbrug).
      - |
        Niveau 2.
        Beschadigde touwen kunnen gevaar opleveren.
        a. Laat zien hoe je touw visueel moet controleren op schade en hoe je touw het beste op kunt slaan om schade te voorkomen.
      - |
        Niveau 3.
        Om een touw veilig te kunnen gebruiken moet je weten wat een touw aan kan.
        a. Leg uit wat de termen breeksterkte en veilig belastbare sterkte betekenen.
        b. Laat zien hoe je de breeksterkte en belastbare sterkte van een touw kunt vinden/opzoeken.
