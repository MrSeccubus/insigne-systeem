{% extends "base.html" %}

{% block title %}{% if speltak %}Speltak bewerken{% else %}Nieuwe speltak{% endif %} — Insigne Systeem{% endblock %}

{% block content %}
<main>
    <h1>{% if speltak %}Speltak bewerken{% else %}Nieuwe speltak{% endif %}</h1>
    <div style="max-width:480px;">
        <form method="post" action="{% if speltak %}/groups/{{ group.slug }}/speltakken/{{ speltak.slug }}/edit{% else %}/groups/{{ group.slug }}/speltakken/new{% endif %}">
            {% if error %}
                <p class="form-error">{{ error }}</p>
            {% endif %}
            <div class="field">
                <label for="name">Naam</label>
                <input type="text" id="name" name="name"
                       value="{{ speltak.name if speltak else '' }}"
                       required maxlength="200" autofocus>
            </div>
            <div style="display:flex;gap:1rem;margin-top:1rem;">
                <button type="submit" class="btn-success">Opslaan</button>
                <a href="/groups/{{ group.slug }}" class="btn-cancel">Annuleren</a>
            </div>
        </form>
    </div>
</main>
{% endblock %}
