slug: internationaal
titel: Insigne Internationaal
introductie: |
  Dit insigne maakt deel uit van het activiteitengebied Internationaal.
  Scouting is een internationale, wereldwijde organisatie. Bij het activiteitengebied Internationaal doe je
  activiteiten waarbij je meer te weten komt over Scouting wereldwijd en andere culturen of je doet mee aan
  internationale uitwisselingen. Met deze insignes maak je kennis met het internationale aspect van Scouting.
eisen:
  - naam: Scouting wereldwijd
    eisen:
      - |
        In Nederland zijn ruim 115.000 mensen lid van Scouting. Wereldwijd zijn er zo'n 55 miljoen scouts.
        a. Vertel je speltak over de geschiedenis van Scouting wereldwijd en over de opkomst van Scouting in Nederland.
        b. Ontdek hoe jouw speltak wordt genoemd in minimaal vijf verschillende landen.
        c. Onderzoek hoe Scouting is georganiseerd in een Europees land naar keuze en deel je bevindingen.
      - |
        Verzamel kennis over Scouting in andere landen en presenteer dit aan je speltak.
        a. Onderzoek in hoeveel landen Scouting wereldwijd actief is.
        b. Kleur op een (digitale) wereldkaart alle landen in waar het Scoutingspel wordt gespeeld.
        c. Zoek uit in welke Europese landen jongens en meisjes gescheiden het Scoutingspel spelen.
        d. Zoek op hoeveel leden er zijn binnen de wereldorganisaties WOSM en WAGGGS.
        e. Verdiep je in Scouting van een land naar keuze, noteer verschillen en overeenkomsten met Nederland en vergelijk ook de wet en belofte.
      - |
        Scouting is lid van twee wereldorganisaties: WOSM en WAGGGS.
        a. Verken de programma's die WOSM en WAGGGS wereldwijd aanbieden, waar jij als scout aan kunt deelnemen.
        b. Kies een activiteit uit een van deze programma's om zelf met je vaste subgroep of met je speltak uit te voeren.
  - naam: Scouting internationaal
    eisen:
      - |
        Scouting is lid van twee wereldorganisaties: WOSM en WAGGGS.
        a. Ontdek wat de volledige namen van WOSM en WAGGGS zijn.
        b. Teken of schilder het logo van WOSM en WAGGGS en zoek overeenkomsten met het logo van Scouting Nederland.
      - |
        De logo's van WOSM en WAGGGS dragen elk een unieke betekenis.
        a. Onderzoek de betekenis achter de logo's van WOSM en WAGGGS.
        b. Zoek uit in welke regio's de WOSM en WAGGGS zijn verdeeld en onder welke regio's Scouting Nederland valt.
        c. Maak een kwartetspel op basis van de regio's van WOSM of WAGGGS en speel het tijdens een opkomst.
      - |
        Duurzaamheid krijgt wereldwijd veel aandacht, ook binnen Scouting.
        a. Verken de specifieke programma's op het gebied van duurzaamheid die WOSM en WAGGGS aanbieden.
        b. Kies een activiteit uit één van deze programma's om zelf uit te voeren.
        c. Zoek vijf voorbeelden van duurzaamheidsinsignes uit andere landen. Kies een activiteit om met je speltak uit te voeren.
  - naam: Internationale contacten
    eisen:
      - |
        Scouting staat voor internationale verbondenheid.
        a. Onderzoek de verschillende manieren waarop scouts wereldwijd met elkaar in contact komen of elkaar kunnen ontmoeten.
        b. Leg contact met scouts uit een ander land en stel vragen, bijvoorbeeld over hun Scoutfit of programma.
      - |
        Wereldwijd worden tal van internationale Scoutingevenementen georganiseerd.
        a. Zoek uit welke internationale Scoutingevenementen er zijn en wat jouw deelnamemogelijkheden zijn.
        b. Neem deel aan een internationale Scoutingactiviteit waarbij je in contact komt met buitenlandse scouts en samen met hen aan activiteiten deelneemt.
      - |
        Er is wereldwijd veel variatie in Scoutingprogramma's.
        a. Leg contact met een buitenlandse scout of Scoutinggroep en wissel programma-ideeën uit via het internationale Scoutingplatform Azimuth of vergelijkbaar.
        b. Maak op basis van de uitwisseling een opkomstprogramma voor je eigen speltak en voer deze uit.
        c. Maak video-opnames tijdens je opkomst en deel deze met je buitenlandse contact.
        d. Vraag aan je buitenlandse contact om hetzelfde te doen en de video met jou te delen.
  - naam: Internationale Scoutingtradities
    eisen:
      - |
        Op 22 februari worden Baden-Powelldag en Wereld Denkdag gevierd. Op 1 augustus is World Scout Scarf Day.
        a. Zoek uit wat deze feestdagen inhouden en hoe ze worden gevierd.
        b. Neem samen met je speltak deel aan World Scout Scarf Day.
      - |
        Het installeren van nieuwe leden in een speltak is een bijzondere traditie binnen Scouting.
        a. Beschrijf de installatietradities van jouw eigen groep.
        b. Vergelijk deze tradities met die van minstens vijf andere Scoutinggroepen in jouw regio en twee buiten je regio.
      - |
        Elk land heeft unieke feestdagen die lokale Scoutinggroepen op hun eigen manier vieren.
        a. Zoek een traditioneel feest uit een ander land dat ook door Scouting in dat land wordt gevierd en organiseer dit feest voor je eigen speltak of groep.
  - naam: Internationale culturen
    eisen:
      - |
        Ieder land heeft een nationale vlag met een unieke betekenis.
        a. Teken vijf verschillende bestaande vlaggen van andere landen en zoek uit wat de betekenis is van de kleuren of afbeeldingen.
        b. Presenteer je tekeningen aan je speltak. Vertel van welk land elke vlag is en wat de betekenis ervan is.
      - |
        In Nederland woont bijna iedereen in stenen huizen, maar dat is niet overal zo.
        a. Selecteer vijf verschillende bouwstijlen uit vijf verschillende landen. Onderzoek de oorsprong en duurzaamheid van elke stijl.
        b. Presenteer je onderzoek aan de hand van een creatie, zoals een plakboek, PowerPoint of miniatuurnabootsingen.
        c. Onderzoek de ecologische voetafdruk van de vijf landen en identificeer de belangrijkste oorzaken van eventuele verschillen.
      - |
        Elk land heeft z'n eigen cultuur en dat kan effect hebben op de lokale Scoutingorganisatie en -activiteiten.
        a. Kies een land buiten Europa en onderzoek hoe culturele gebruiken daar de organisatie en activiteiten van Scouting beïnvloeden.
        b. Ontwikkel een programma dat de leden van je speltak laat kennismaken met deze culturele verschillen.
