slug: varen_op_spierkracht
titel: Insigne Varen op spierkracht
introductie: |
  ***Dit insigne maakt deel uit van het activiteitengebied Uitdagende Scoutingtechnieken.***
  In dit activiteitengebied doe je activiteiten rondom een techniek, zoals hakken, stoken, kaart en kompas,
  routetechnieken, pionieren, zeilen en kamperen. Met dit insigne maak je kennis met vaartechnieken
  waarbij spierkracht nodig is, oftewel peddelen, roeien en wrikken. Je leert eerst de basis van roeien en/of
  kanoën en maakt daarna kennis met andere vaartechnieken. Dit insigne is speciaal bedoeld voor
  waterscouts, maar kunnen natuurlijk ook door andere scouts gedaan worden.
eisen:
  - naam: Voorbereiding
    eisen:
      - |
        Een goede voorbereiding is het halve werk. Van eisen a en b kies je er één.
        a. Kano-variant: maak de kano vaarklaar en zorg ervoor dat alles op de goede plek ligt en klaar is om te gebruiken (denk daarbij aan de reddingsvesten).
        b. Roei-variant: maak de lelievlet vaarklaar en zorg ervoor dat alles op de goede plek ligt en klaar is om te gebruiken: 
          - 4 (of 6) riemen
          - 4 (of 6) dollen
          - wrikriem
          - 1 anker
          - 1 ankerlijn
          - 4 landvasten 
          - reddingsvesten.
      - |
        Een goede voorbereiding is het halve werk.
        a. Maak een checklist voor elke activiteit uit dit insigne (niveau 2) en voer deze voorbereidingen uit.
      - tekst: |
          Veiligheidsregels zijn belangrijk en neem je mee in de voorbereiding.
          a. Toon aan dat je voor elke activiteit uit dit insigne weet welke veiligheidsregels van toepassing zijn. ==Houd hierbij ook rekening met het niet verstoren van natuurgebieden en dieren.==
        groen: true
  - naam: Ritme
    eisen:
      - |
        Een dirigent bepaald het ritme in het orkest. Wie bepaalt het ritme in de boot? 
        *Van de eisen a en b kies je er één.*
        a.  Kano-variant:
          - Om te weten hoe kanoën precies werkt kun je eerst in je eentje kanoën om een goed gevoel te krijgen hoe het werkt.
          - Tijdens het kanoën ben jij de achterste in de kano. Jij vertelt tegen de rest van de bemanning wat zij moeten doen. Jij bepaalt ook welke kant de kano opgaat door te sturen. 
        b.  Roei-variant:
          - Eerst volg je de slagroeier, roei zo goed mogelijk met hem mee.
          - Daarna probeer je zelf de slagroeier te zijn, probeer het ritme zo goed mogelijk vol te houden.


        *Tip: hou bij de uitvoering van het roeien rekening met je eigen lengte. Kies bijvoorbeeld voor een juniorvlet of lichtere roeiriem.*
      - |
        Bij wrikken is het ritme belangrijk. Hoe beter je 'de slag' te pakken krijgt, hoe sneller je vooruit komt.
        a. Ga wrikken met je lelievlet, zowel vanaf het achterdek als vanuit de kuip, over een afstand van minimaal 50 meter.
        b. Bespreek na afloop de verschillen tussen deze twee technieken, wat jou op dit moment het beste lukt en waarom.
      - |
        Bij bepaalde types boten is het ritme belangrijker, doordat het tempo hoger ligt of er voor genoeg snelheid of kracht een goed ritme nodig is.
        Van de eisen a t/m c kies je er één.
        a. Ga varen met een roeisloep, één keer als bemanningslid en één keer als roerganger.
        b. Ga drakenboot varen: eerst als roeier, dan als trommelaar. Probeer zo goed mogelijk het ritme aan te geven aan de bemanning.
        c. Ga varen met een meerpersoons wedstrijdroeiboot, één keer als bemanningslid en één keer als roerganger.

        *(Lees de toelichting voor keuze van de vaarmiddelen)*
  - naam: Manoeuvres
    eisen:
      - |
        In een parcours kun je goed laten zien hoe goed je stuurt. Van de eisen a en b kies je er één.
        a.  Kano-variant:
          - Oefen de volgende kanoslagen: J-slag en D-slag.
          - Laat zien dat je goed met de kano kunt sturen. Leg met je kano een parcours af, beëindig het parcours met een achtje varen.

        b.  Roei-variant:
          - Laat zien dat je goed met de vlet kunt sturen tijdens het roeien. Leg met je vlet een parcours af en beëindig het parcours met een achtje varen.
          - In de tweede ronde is de bemanning geblinddoekt tijdens het afleggen van hetzelfde parcours.
      - |
        Een andere techniek om in ondiep water je boot voort te bewegen is bomen met vaarboom.
        a. Oefen met bomen in ondiep water.
        b. Organiseer een boom-tijdsproef over 100 meter voor je speltak of subgroep om te ontdekken wie het snelst boomt.
      - |
        Varen met een kajak of kano op onbekend water kan soms best spannend zijn.
        *Voer één van de volgende eisen uit onder leiding van een ervaren instructeur.*
        a. Ga minimaal een uur kajakken of kanoën op stromend water.
        b. Ga minimaal een uur kajakken of kanoën op ruim water.
        c. Leer in een zwembad eskimoteren met een kajak.
  - naam: Wel of niet in het water
    eisen:
      - tekst: |
          Soms val jij of iets anders in het water en dan weet jij wat je moet doen.
          Van eisen a en b kies je er één.
          a.  Kano-variant:
            - Oefen wat je moet doen als de kano omslaat en let hierbij op de andere scouts in je kano.
            - Ga onder toezicht van leiding zwemmend onder de kano en kijk of er lucht onder zit. 
          b.  Roei-variant:
            - Soms vallen er dingen in het water, die niet in het water horen. Doe een verzamelspel op het water waarbij je diverse voorwerpen of soorten afval uit het water moet halen (en leert manoeuvreren). 
        groen: true
      - tekst: |
          Een goede scout heeft respect voor de natuur, ook op het water. 
          *Van eisen a en b kies je er één.*
          a. Help de natuur op en rond het water een beetje beter achter te laten door afval te verzamelen op het water en langs de oevers.
          b. Doe mee aan Scouts4Science, met het verzamelen en meten van plastic in het water. ([https://www.scouts4science.nl/](https://www.scouts4science.nl/))
        groen: true
      - |
        Tijdens het varen kan altijd iemand in het water vallen.
        a. Voer met een lelievlet een reddingsmanoeuvre uit terwijl je vaart op spierkracht. Gebruik hiervoor een levensgrote (zelfgemaakte) dummy/pop of een licht persoon in reddingsvest. Doe dezelfde opdracht vanuit een kano/kajak.
  - naam: Varen
    eisen:
      - |
        Stabiliteit bij het varen is wel fijn, te veel wiebelen vaart minder lekker en kost snelheid. 
        *Van de eisen a en b kies je er één.*
        a.  Kano-variant:
          - Oefen met de stabiliteit in een open kano door het spel Kanolimbo te doen. Tijdens dit spel onderzoek je het gevolg van hoog of laag zitten, het aantal mensen in een kano en of in het midden of op het randje zitten verschil maakt. 

        b.  Roei-variant:
          - Een zwaard is belangrijk in de stabiliteit van een boot. Ga een stukje varen met zwaard en probeer te wiebelen met de boot. Doe dit eerst met het zwaard in het water en daarna zonder. Bespreek welk verschil je merkt. 
          - Toon aan dat je het zwaard kunt bedienen en let hierbij op de veiligheid. Hanteer de veiligheids-regels van je groep.
      - |
        Met een wat langere vaartocht leer je de vaartechnieken van een boottype pas echt goed kennen.
        *Van de eisen a en b kies je er één.*
        a. Vaar met een sup een route van minimaal drie kilometer.
        b. Vaar in een kajak een tocht van minimaal drie kilometer.
        c. Vaar met een BIG SUP een route van minimaal twee kilometer.
      - |
        Maak kennis met andere vaarmiddelen. 
        *Van de eisen a t/m c kies je er één.*
        a. Roei met een skiff een route van minimaal vijf kilometer.
        b. Roei met big blades.
        c. Vaar met een BIG SUP een route van minimaal twee kilometer.

        *(Lees de toelichting voor keuze van de vaarmiddelen)*
nawoord: |
  # Toelichting Insigne Varen op spierkracht

  **Algemene adviezen:**
  Niveau 3 vereist enige minder gebruikelijke vaarmiddelen. Hierbij kun je kiezen om een keer te combineren met een uitwisseling met een roeivereniging of regel een dergelijk vaartuig met meerdere speltakken of groepen. Daarmee beperk je de kosten. Je hoeft niet precies het genoemde vaartuig te regelen, het mag ook een gelijkwaardig alternatief zijn, mits het de scout laat kennismaken met nieuwe vaarmiddelen en ook een zelfde soort uitdaging biedt.

  **Praktische adviezen:**
  De J-slag is de basis-slag voor kanoën, het is een kleine achterwaartse slag door het water. Als je wilt dat de kano naar links gaat, moet de achterschipman een J-slag maken aan de linkerkant van de kano. Om naar rechts te gaan, moet de achterschipman een J-slag aan de rechterkant van de kano maken. Zoek eventueel hulp van een instructeur om dit goed aan te leren.

  Voor het roeien zijn verschillende klassen van riemen. Je hebt een standaard roeiriem, wrikriem, maar ook lichte riemen of junior-riemen. Deze riemen zijn wat lichter en roeien daarom makkelijker. Het nadeel is wel dat ze sneller breken als ze door oudere scouts gebruikt worden. Kijk dus goed welke riemen je gebruikt met roeien.

  **Insigne Varen op Spierkracht voor niet-waterscouts**
  Beide varianten van niveau 1 van het insigne zijn zonder aanpassingen uitvoerbaar voor niet-waterscouts. Voor niveau 2 en 3 is meer ervaring met varen noodzakelijk. 

  Voor dit soort insignes is het goed om contact te leggen met een waterscoutinggroep. Zij hebben veel vaarmateriaal en weten hier goed mee om te gaan. Binnen de richtlijnen van Scouting Nederland, de Nautisch Technische Richtlijnen (NTR), is het ook verplicht om begeleiding met passende kwalificaties bij je activiteit te hebben. 

  **Aansluitende watersportopleidingen:**
  Niveau 1 en 2 van dit insigne laat je kennismaken met de basistechnieken van het roeien en/of kanoën. 
  Na deze twee niveaus heb je een goede basis om met een watersportdiploma roeien of kanoën te starten. Dit is een relatief kleine stap. De organisatie van watersportdiploma’s is volop in ontwikkeling. Zodra hier meer informatie over bekend is, wordt dit aan deze toelichting toegevoegd. 

  **Handige links en informatie:**
  Voor spelen op en rond het water zijn veel voorbeelden te vinden op de Activiteitenbank, kies dan voor locatie ‘Op en om het water’, 
  [https://activiteitenbank.scouting.nl/](https://activiteitenbank.scouting.nl/). 
