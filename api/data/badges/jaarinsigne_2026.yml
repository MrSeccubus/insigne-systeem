slug: jaarinsigne_2026
titel: Jaarinsigne 2026 - Nieuwe Insignes
type: jaarinsigne
introductie: |
  In september 2025 is een nieuw insignepakket voor de hele vereniging geïntroduceerd. Met het jaarinsigne 2026 kun je op een creatieve manier 'proeven' van de nieuwe insignes. Je kiest zelf de insigne-eisen uit die je wilt doen en dat mogen insigne-eisen zijn van verschillende insignes. Voor elke leeftijdsgroep geldt een minimum aantal punten dat je moet halen om het jaarinsigne 2026 te verdienen.

  De nieuwe insignes hebben elk 3 niveaus: een insigne-eis op niveau 1 (geel) = 1 punt, op niveau 2 (oranje) = 2 punten en op niveau 3 (paars) = 3 punten. Sommige insigne-eisen zijn groen gekleurd en hebben te maken met duurzaamheid — dit noemen we de groene lijn. Alle insignes en insigne-eisen vind je op de [Activiteitenbank](https://activiteitenbank.scouting.nl/).
speltakken:
  bevers:
    - titel: "Insignepunten"
      tekst: |
        Behaal het door jullie leidingteam bepaalde minimum aantal insignepunten (advies: 2 à 3 eisen op niveau 1).
    - titel: "Groene lijn"
      tekst: |
        Waarvan minimaal één groene insigne-eis.
  welpen:
    - titel: "Insignepunten"
      tekst: |
        Behaal minimaal **5 insignepunten**. Je kunt insigne-eisen uit verschillende niveaus kiezen, bijvoorbeeld vijf eisen op niveau 1 of drie op niveau 1 en één op niveau 2.
    - titel: "Groene lijn"
      tekst: |
        Waarvan minimaal één groene insigne-eis.
    - titel: "Spreiding"
      tekst: |
        Kies insigne-eisen van minimaal **2 verschillende insignes**.
  scouts:
    - titel: "Insignepunten"
      tekst: |
        Behaal minimaal **8 insignepunten**. Je kunt insigne-eisen uit verschillende niveaus kiezen.
    - titel: "Groene lijn"
      tekst: |
        Waarvan minimaal één groene insigne-eis.
    - titel: "Niveau 2"
      tekst: |
        Minimaal één insigne-eis op niveau 2 (oranje).
    - titel: "Spreiding"
      tekst: |
        Kies insigne-eisen van minimaal **2 verschillende insignes**.
  explorers:
    - titel: "Insignepunten"
      tekst: |
        Behaal minimaal **10 insignepunten**. Je kunt insigne-eisen uit verschillende niveaus kiezen.
    - titel: "Groene lijn"
      tekst: |
        Waarvan minimaal één groene insigne-eis.
    - titel: "Niveau 2"
      tekst: |
        Minimaal één insigne-eis op niveau 2 (oranje).
    - titel: "Niveau 3"
      tekst: |
        Minimaal één insigne-eis op niveau 3 (paars).
    - titel: "Spreiding"
      tekst: |
        Kies insigne-eisen van minimaal **3 verschillende insignes**.
  roverscouts:
    - titel: "Insignepunten"
      tekst: |
        Behaal minimaal **12 insignepunten**. Je kunt insigne-eisen uit verschillende niveaus kiezen.
    - titel: "Groene lijn"
      tekst: |
        Waarvan minimaal twee groene insigne-eisen.
    - titel: "Niveau 2"
      tekst: |
        Minimaal twee insigne-eisen op niveau 2 (oranje).
    - titel: "Niveau 3"
      tekst: |
        Minimaal één insigne-eis op niveau 3 (paars).
    - titel: "Spreiding"
      tekst: |
        Kies insigne-eisen van minimaal **3 verschillende insignes**.
nawoord: |
  **Tips:**

  - Doordat het nieuwe insignepakket voor de hele vereniging hetzelfde is, kun je de kennismaking met de nieuwe insignes ook combineren in een gezamenlijk groepsweekend.
  - Elke groep heeft een gratis insigneposter ontvangen. Gemist? Download hem samen met de toelichting op [activiteitenbank.scouting.nl](https://activiteitenbank.scouting.nl/insignes-en-badges/hoe-werkt-het).
  - Alle insignes, inclusief het jaarinsigne, zijn verkrijgbaar bij de [ScoutShop](https://www.scoutshop.nl/voor-scouts/badges-en-insignes/vaardigheidsinsignes).
