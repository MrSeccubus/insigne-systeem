slug: kunstenaar
titel: Insigne Kunstenaar
introductie: |
  Dit insigne maakt deel uit van het activiteitengebied Expressie.
  In dit activiteitengebied doe je activiteiten waarmee je je kunt uitdrukken, zoals dansen, filmen,
  handvaardigheid, toneelspelen, muziek maken en schrijven. Met dit insigne ga je aan de slag met
  kunstzinnige en creatieve activiteiten waarmee je iets van jezelf kunt laten zien en 'creëren'.
eisen:
  - naam: Papier
    eisen:
      - |
        Niveau 1.
        Werken met en op papier. Voer minstens 2 van de 3 eisen uit.
        a. Maak een tekening op A4 formaat met een grijs potlood van het huis waar je in woont met alle bewoners. Trek deze tekening over op een ander papier en kleur de tekening in.
        b. Maak een schilderij van je favoriete (jungle)dier op A3 formaat papier. Trek de lijnen met een zwarte stift en vul de vlakken met zelf gemaakte verf.
        c. Maak een wenskaart voor iemand in je speltak/groep op A5 formaat papier met minstens 3 soorten papier. Verwerk knippen, scheuren, propjes en vouwen.
      - |
        Niveau 2.
        Werken met en op papier. Voer minstens 3 van de 4 eisen uit.
        a. Teken op A4 formaat een 'illusie' en vergroot of verklein deze op A3 of A5 formaat.
        b. Zet je gedachten op papier in de vorm van een gedicht van 3 x 4 = 12 regels met rijmvorm. Draag dit voor aan de leiding.
        c. Maak van oude kranten of tijdschriften papier-maché en maak een dier.
        d. Origami is een Japanse vouwkunst. Maak een 2D en een 3D werkje.
      - |
        Niveau 3.
        Werken met en op papier. Voer minstens 4 van de 5 eisen uit.
        a. Teken op A4 formaat een perspectief van je straat, huis of clubhuis.
        b. Ga papierscheppen. Maak van oud papier weer nieuw papier met natuurlijke kleuren of bloemen.
        c. Schrijf een spannend verhaal met een kop en een staart, een plot en twist. Draag dit voor tijdens een kampvuuravond.
        d. Ga aan de slag met aquarelpapier en aquarelpotloden of verf.
        e. Verzamel je kennis van papier, beschrijf de voor- en nadelen of andere bijzonderheden die je ontdekt hebt.
  - naam: Textiel
    eisen:
      - |
        Niveau 1.
        Werken met stoffen en draden. Voer minstens 3 van de 4 eisen uit.
        a. Laat zien dat je kan vingerhaken en maak een sliert van 1 meter.
        b. Laat zien dat je kan punniken. Maak je punnikwerk minstens 1 meter en gebruik verschillende kleuren.
        c. Maak een weefraampje van karton en weef een lapje van minstens 10 centimeter met minimaal 4 kleurtjes wol, of borduur je naam in kruissteek op een lap stof.
        d. Ga met naald en draad zelf een insigne op je bloes naaien zodat hij er niet afvalt.
      - |
        Niveau 2.
        Werken met stoffen en draden. Voer minstens 2 van de 4 eisen uit.
        a. Laat oude sokken weer tot leven komen. Maak van 2 oude sokken sokpoppen en geef ze een karakter. Bedenk een kort verhaal (sketch) dat je met de 2 sokpoppen aan je speltak kunt laten zien.
        b. Brei of haak een lap van minstens 15 bij 15 cm.
        c. Tie dye je eigen T-shirt.
        d. Maak een leuke sleutelhanger met macramé. Gebruik 2 van de 3 knopen: spiraalknoop, platte knoop, diagonale cordonknoop.
      - |
        Niveau 3.
        Werken met stoffen en draden. Voer minstens 2 van de 4 eisen uit.
        a. Naai op de naaimachine een tas. Maak zelf een keuze in het soort tas, zoek of maak een patroon. Nog leuker als je oude kleding hiervoor gebruikt!
        b. Borduur een merklap met de naam van je groep en 4 verschillende patroontjes, of brei een trui.
        c. Verwerk viltwol tot een bloem, dier of poppetje.
        d. Maak een zeefdruk voor op een kampshirt en druk dit op de shirts voor je kamp.
  - naam: Beeldende vorming
    eisen:
      - |
        Niveau 1.
        Werken met materiaal als klei, steen, hout, glas, metaal of 'loose parts'. Voer minstens 3 van de 5 eisen uit.
        a. Maak van natuurlijke klei een voorwerp dat je thuis of op het clubhuis kunt gebruiken.
        b. Maak een figuur zoals een ster of een veer van metaaldraad en versier deze met kraaltjes.
        c. Recycleer een oude glazen pot van groente en maak het mooi door er met glasverf op te verven.
        d. Maak met een figuurzaag een dier van hout.
        e. Maak van 'loose parts' (kosteloos materiaal, restanten of natuurlijke materialen) een tol of spinner.
      - |
        Niveau 2.
        Werken met materiaal als klei, steen, hout, glas, metaal of 'loose parts'. Voer minstens 3 van de 5 eisen uit.
        a. Maak het logo van je groep, een mandala of een andere afbeelding met mozaïeksteentjes op een plaat hout.
        b. Soldeer een werkstuk met bijvoorbeeld ledlampjes en een batterij.
        c. Ga glasgraveren op glas. Graveer je naam en/of tekening op een plat stuk glas.
        d. Maak een leuke houten hanger, plank of onderzetter door er op te houtbranden (pyrografie).
        e. Maak van 'loose parts' een muziekinstrument waarop je een liedje kunt spelen.
      - |
        Niveau 3.
        Werken met materiaal als klei, steen, hout, glas, metaal of 'loose parts'. Voer minstens 3 van de 5 eisen uit.
        a. Maak van steen of speksteen een dier.
        b. Metaal kun je ook gieten. Bedenk wat je wil maken, maak een mal en giet het metaal.
        c. Verdiep je in de kunst van glas in lood of glasblazen en maak een mooi kunstwerk.
        d. Maak vanuit een stuk boom je eigen spel, zoals een spelbord met spelstukken of kubb.
        e. Ga aan de slag met loose parts en beschrijf naderhand hoe het proces is verlopen.
  - naam: Techniek
    eisen:
      - |
        Niveau 1.
        Werken met techniek zodat iets kan bewegen, draaien, verwarmen of een ander beeld kan geven. Voer minstens 1 eis uit.
        a. Maak van karton of hout een grijper of grijparm.
        b. Timmer op een plaat hout een flipperkast.
        c. Maak een hydraulische lift van karton en/of hout.
        Laat de anderen in je speltak zien wat je er mee kan.
      - |
        Niveau 2.
        Werken met techniek zodat iets kan bewegen, draaien, verwarmen of iets anders kan. Voer minstens 1 eis uit.
        a. Maak een caleidoscoop.
        b. Maak een hydraulisch labyrint.
        c. Maak een electrospiraal.
        Laat de anderen in je speltak zien wat je er mee kan.
      - |
        Niveau 3.
        Werken met techniek zodat iets kan bewegen, draaien, verwarmen of iets anders kan. Voer minstens 1 eis uit.
        a. Maak je eigen solar oven.
        b. Bouw je eigen radio.
        c. Bouw je eigen frisdrankmachine (dispenser).
        Laat de anderen in je speltak zien dat jouw werkstuk werkt!
  - naam: Natuurlijke Expressie
    eisen:
      - |
        Niveau 1.
        Werken met materialen uit de natuur. Voer minstens 2 van de 3 eisen uit.
        a. Verzamel in de tuin, bos of andere natuurlijke plek takken van diverse bomen. Recycle oude kerstballen, paasfiguren of vormpjes en maak een kerst- of paasstukje.
        b. Verzamel takken, bladeren, stengels en bloemen en maak een kunststuk.
        c. Maak een weefraam van een stuk karton, natuurlijk touw en natuurlijke materialen zoals takjes, grassoorten en bloemen.
      - |
        Niveau 2.
        Werken met materialen uit de natuur. Voer minstens 2 van de 3 eisen uit.
        a. Verzamel diverse soorten bloemen en maak er een mooie bos van (bloemschikken).
        b. Van een oude omgezaagde boom kun je van de stam en takken (laten) plakzagen. Maak er een kunstwerk van.
        c. Maak met diverse materialen uit de natuur een insectenhotel. Zet hem thuis of bij je clubhuis neer.
      - |
        Niveau 3.
        Werken met materialen uit de natuur. Voer minstens 2 van de 3 eisen uit.
        a. Thebana is een Japanse manier van werken met bloemen. Maak via deze methode een bloemstuk.
        b. Ga op zoek naar diverse bloemen, groente, fruit en bladeren en maak je eigen verf. Beschrijf van welke bloem, fruit of groente een bepaalde kleur komt.
        c. Verzamel in de herfst zaaddozen van diverse planten en struiken, de vruchten van bomen en dergelijke. Maak hier op een strokrans een mooie herfstkrans van.
nawoord: |
  'Loose parts' in de beeldende vorming zijn onbestemde, losse materialen met een open einde die kinderen zelf
  vormgeven tot hun spel of creatieve werk. Het zijn geen speelgoedonderdelen met een vaste functie, maar
  voorwerpen die kinderen kunnen verplaatsen, aanpassen en combineren voor oneindig veel doeleinden.
  Voorbeelden zijn dozen, takken, stenen, touw, en doeken.
