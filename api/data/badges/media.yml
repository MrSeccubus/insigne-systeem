slug: media
titel: Insigne Media
introductie: |
  Dit insigne maakt deel uit van het activiteitengebied Samenleving.
  In dit activiteitengebied doe je activiteiten die te maken hebben met je eigen omgeving, het cultureel erfgoed en de
  maatschappij (maatschappelijke participatie). Media zijn communicatiekanalen om informatie over te dragen en is
  onderdeel van de hele samenleving. Met dit insigne leer je meer over de verschillende media en hoe je hier mee
  om kunt gaan.
eisen:
  - naam: Klassieke media
    eisen:
      - |
        Boeken en geschriften zijn oude vormen van media.
        a. Zoek een oud artikel over natuur uit een Scoutingledenblad, lees dit voor aan je speltak en vertel waarom je voor dit artikel hebt gekozen.
        b. Schrijf een stukje over wat natuur voor jou betekent en waarom het belangrijk is om goed voor de natuur te zorgen. Laat het lezen door je leiding en je speltak.
      - |
        Omdat veel mensen vroeger niet konden lezen werden er vaak afbeeldingen en symbolen gebruikt om een boodschap over te brengen.
        a. Bedenk een boodschap over duurzaamheid die je aan je speltak wilt overbrengen.
        b. Verwerk deze boodschap in een poster met afbeeldingen, kleuren of symbolen.
        c. Hang de poster op in het clubhuis en vraag aan je speltak welke boodschap ze denken te zien.
      - |
        Kranten zijn ontstaan in de 17e eeuw in Europa.
        a. Ontwerp een krant of nieuwsbrief over duurzaamheid. Schrijf stukjes, voeg foto's toe, maak een voorpagina en verwerk één artikel als persbericht.
        b. Bied het persbericht aan bij lokale media of plaats het op de sociale media van je groep.
  - naam: Auditieve media
    eisen:
      - |
        De oudste vorm van nieuws doorvertellen is het zingen of doorvertellen van verhalen.
        a. Verzamel nieuwtjes over je speltak of groep en verkondig deze als een stadsomroeper aan je speltak.
        b. Schrijf een liedtekst over een Scoutingavontuur dat je hebt beleefd op een bekende melodie en zing het voor je speltak.
      - |
        Met de intrede van de radio werd het nieuws voor veel mensen bereikbaar.
        a. Zoek de kenmerken en verschillen op van een lampenradio, transistorradio en digitale radio.
        b. Maak een hoorspel van minimaal 3 minuten door aan een spannend verhaal geluidseffecten toe te voegen. Gebruik voor de geluidseffecten materialen in het gebouw van je Scoutinggroep.
      - |
        In het moderne digitale tijdperk maken geluidsbestanden nog steeds een belangrijk onderdeel uit van de media.
        a. Ontwikkel een podcast van minimaal 5 minuten over een maatschappelijk of Scoutingthema. Verdiep je in het onderwerp, stel interviewvragen op, zorg voor een sterke opening en afronding, nodig gasten uit en neem het gesprek op.
        b. Deel de podcast met je speltak.
  - naam: Visuele media
    eisen:
      - |
        In 1826 is de fotografie uitgevonden.
        a. Maak foto's over een onderwerp dat je aan je speltak of leiding wil vertellen.
        b. Denk goed na over compositie: onderwerp, plaats, licht en tijdstip.
        c. Presenteer je verhaal aan de hand van je foto's en leg uit waarom je ze hebt gekozen.
      - |
        Met de intrede van het opnemen van bewegende beelden (kinematografie) ontstonden nieuwe mogelijkheden.
        a. Maak een flipboekje met zelfgemaakte tekeningen, waarin je de tekeningen tot 'leven' laat komen.
      - |
        In 1895 werd de eerste film vertoond (cinematografie).
        a. Ga aan de slag als beeldjournalist op een Scoutingevenement in je speltak, groep of op regio- of landelijk niveau. Maak vooraf afspraken over de onderwerpen en regels omtrent het gebruik van foto's of video.
        b. Presenteer je foto- of videorapportage aan een publiek.
  - naam: Interactieve media
    eisen:
      - |
        Interactieve media zijn media waarop de gebruiker door handelingen invloed kan uitoefenen, zoals games en sociale media.
        a. Zoek vier voor- en nadelen van sociale media op door te overleggen of online te zoeken.
        b. Leg uit waarom het belangrijk is om toestemming te vragen voordat je een foto van iemand deelt.
      - |
        Vrijwel iedereen maakt tegenwoordig gebruik van sociale media en games, maar op een eigen manier.
        a. Onderzoek hoe je speltakgenoten (jeugdleden EN leiding) omgaan met sociale media en games. Vraag naar welke platforms ze gebruiken, hoeveel tijd ze eraan besteden en wat ze er leuk of minder leuk aan vinden.
        b. Presenteer je bevindingen aan je speltak en geef aan welke afspraken jij belangrijk vindt.
      - |
        Vrijwel alle Scoutinggroepen beheren een eigen website of sociale media-account.
        a. Help minimaal een maand mee met het beheren van het sociale media-account of de website van je groep. Zorg voor regelmatige berichten met aandacht voor bereik en interactie.
        b. Maak wekelijks minimaal twee posts of berichten.
        c. Heeft je groep nog geen actief kanaal? Maak dan een plan op om dat op te starten.
  - naam: Mediawijsheid
    eisen:
      - |
        Op radio, televisie, internet en apps kom je veel reclame tegen.
        a. Vertel aan je speltak welke reclame je heel leuk vindt, welke reclame je heel irritant vindt en wat het doel van reclame is. Geef ook voorbeelden van hoe je door reclame wordt beïnvloed.
        b. Sluit de presentatie af met een zelfbedachte reclame waarin je een duurzaam product aanprijst. Gebruik daarbij beelden.
      - |
        Sociale media brengen soms ook risico's met zich mee.
        a. Onderzoek risico's van sociale media zoals clickbait, nepnieuws, AI, online pesten en sexting.
        b. Maak hierover een digitale presentatie voor je speltak.
      - |
        Op internet is van bijna iedereen wel iets te vinden.
        a. Zoek op wat er over jou op internet staat. Denk na over wat je wel of niet online wilt hebben en ga aan de slag om eventuele ongewenste dingen te verwijderen.
        b. Zoek informatie op over een idool (via internet en sociale media) en maak een persoonlijk profiel van deze persoon.
        c. Presenteer dit profiel aan je speltak alsof je een showbizzverslaggever bent.
