slug: navigeren
titel: Insigne Navigeren
introductie: |
  Dit insigne maakt deel uit van het activiteitengebied Uitdagende Scoutingtechnieken.
  In dit activiteitengebied doe je activiteiten rondom een techniek, zoals hakken, stoken, kaart en kompas,
  routetechnieken, pionieren, zeilen en kamperen. Met dit insigne leer je omgaan met kaart en kompas en diverse
  routetechnieken om goed te kunnen navigeren.
eisen:
  - naam: Kaart
    eisen:
      - |
        Er zijn allerlei verschillende kaarten om je positie te kunnen bepalen.
        a. Noem de kenmerken van en verschillen tussen een wegenkaart, een topografische kaart, een waterkaart en een luchtkaart.
        b. Leg uit wat symbolen in de legenda, de schaal, kleuren voor vlakken en RijksDriehoekcoördinaten op een kaart inhouden.
      - |
        Je kunt op verschillende manieren je positie berekenen op een kaart.
        a. Demonstreer dat je met behulp van coördinaten en een kaarthoekmeter nauwkeurig locaties op een kaart kunt aanwijzen.
        b. Bepaal tijdens een route je positie met behulp van kaartkenmerken, een GPS en een kaarthoekmeter.
        c. Leg het verschil uit tussen RD, WGS84 en UTM, en laat zien hoe je deze systemen gebruikt.
      - |
        Door het goed gebruiken van kaarten kun je nauwkeurig een route uitzetten.
        a. Zet een tocht van minimaal 25 km uit met een kaart. Houd rekening met hoogtelijnen (landscouts) of dieptelijnen en doorvaarhoogten (waterscouts). Gebruik een geschikte topografische kaart (1:25.000).
        b. Benoem topografische kenmerken of bruggen bij tussenpunten.
        c. Bereken de tijdsduur per deeltraject op basis van tempo, vaarsnelheid of windsnelheid.
  - naam: Magnetisch kompas en GPS
    eisen:
      - |
        Er zijn verschillende hulpmiddelen en technieken waarmee je kunt navigeren.
        a. Benoem de onderdelen van een kompas: plaat/huis, richtingspijl, naald, roos, hulplijnen en de acht windrichtingen.
        b. Maak een eenvoudig kompas met een kurk en naald en leg de werking uit.
        c. Navigeer met een GPS-apparaat naar een coördinaat via een directe route en een route over paden.
        d. Leg tijdens het navigeren een GPS-track vast en laat die zien.
      - |
        Er zijn verschillende manieren waarop je met een kompas of GPS je richting kunt bepalen.
        a. Benoem zestien windrichtingen met een kompas.
        b. Gebruik een kompas om graden te schieten, van een zichtbaar object de richting te bepalen, op een kaart de richting te bepalen en de vier kompasgrepen toe te passen.
        c. Leg uit wanneer een kompas geen betrouwbare meting geeft.
        d. Zoek een eenvoudige geocache en een multicache met minimaal vijf stappen.
        e. Laat zien dat je het noorden kunt bepalen met de wijzerplaat van een horloge, aan de hand van kenmerken in de natuur en met een zelfgemaakte zonnewijzer.
      - |
        Als ervaren navigator ken je de fijne kneepjes van het gebruik van kompas en GPS.
        a. Benoem alle 32 windrichtingen met een kompas.
        b. Leg uit wat de begrippen declinatie, inclinatie en deviatie inhouden en hoe je hiermee rekening houdt.
        c. Laat zien dat je het noorden kunt bepalen aan de hand van de sterren, de stand van de zon, een maankompas en met een schaduwstok. Leg ook de beperkingen van deze methoden uit.
        d. Leg de theorie achter GPS-locatiebepaling uit.
        e. Zoek met een GPS minimaal vijf geocaches, waarvan minstens drie multicaches van tien of meer tussenstops.
        f. Maak zelf twee geocaches, waarvan minimaal één een multicache is.
  - naam: Routetechnieken begrijpen
    eisen:
      - |
        Eenvoudige routetechnieken kun je gebruiken voor speurtochten.
        a. Laat zien dat je de volgende routetechnieken kent: lintjesroute, fotoroute, kruispuntenroute, aangezichtskruispuntenroute, tekstroute, ogenroute, route met spoortekens (takjes, stenen, gras e.d.).
      - |
        Een echte scout kent meerdere routetechnieken, ook voor de wat moeilijkere speurtochten.
        a. Laat zien dat je de volgende routetechnieken kent: stripkaart/visgraat, aangezichtsstripkaart, coördinatenroute, kruispeiling, kompasroute (gradenroute), oleaat, blinde vlek, bolletjes- en bolletjes-pijltjesroute.
      - |
        Als specialist in routetechnieken kun je ze ook laten zien en toepassen in de praktijk.
        a. Laat zien dat je de volgende routetechnieken kent: blinde lijn, vectorroute, helikopterroute.
        b. Neem deel aan een vrije zwerfhike van minimaal vijftien kilometer op het land of het water. Bepaal vooraf de beste route op basis van weer en snelheid en gebruik minimaal vijf verschillende routetechnieken.
        c. Zet een wildspoor uit of volg er een.
  - naam: Schatten en schetsen
    eisen:
      - |
        Bij het navigeren is het belangrijk dat je je omgeving kunt inschatten en weergeven.
        a. Schat de hoogte van een object met de potloodtechniek.
        b. Maak een situatieschets.
      - |
        Afstanden inschatten en routes beschrijven helpen je bij het navigeren en terugvinden van routes.
        a. Schat de afstand tot een object met de driehoekmethode.
        b. Maak een routeschets van een route met minimaal tien kruispunten.
      - |
        Je kunt je omgeving, ook op en rond het water, goed inschatten en weergeven op verschillende manieren.
        a. Meet of bereken de stroomsnelheid van een beek of rivier.
        b. Leg het verschil uit tussen een recognografische schets, panoramaschets en horizonschets en maak een voorbeeldschets van één van deze drie.
  - naam: Routetechnieken gebruiken
    eisen:
      - |
        Laat zien dat wat je geleerd hebt ook kunt toepassen.
        a. Loop of vaar een tocht van minimaal vijf kilometer met minstens twee routetechnieken.
        b. Zet een speurtocht of vaarroute uit voor je speltak met minstens twee routetechnieken van niveau 1. Houd rekening met verkeers- en natuurregels.
      - |
        Je weet je weg te vinden en richting aan te geven bij wat langere tochten.
        a. Loop een tocht of hike van minimaal vijftien kilometer met meerdere routetechnieken. Neem de leiding over de groep en geef de richting aan.
        b. Zet een hike van minimaal tien kilometer uit door een natuurgebied met minimaal drie routetechnieken van niveau 2.
      - |
        Een ervaren navigator is ook een ervaren hiker.
        a. Neem de rol van navigator op je tijdens een meerdaagse hike of vaartocht, waarbij gebruik wordt gemaakt van diverse kaart- en kompastechnieken.
        b. Geef twee alternatieve routetechnieken die ook bruikbaar zouden zijn geweest voor deze hike of vaartocht.
        c. Zet een hike van minimaal vijftien kilometer of een vaartocht van minimaal tien kilometer uit in een natuurgebied met minimaal drie routetechnieken van niveau 2 en minimaal twee van niveau 3.
nawoord: |
  Scouts gaan met respect om met de natuur. Beschadig geen bomen, planten of oeverbegroeiing tijdens het
  lopen of varen en bij het bevestigen van speurtochttekens. Volg de lokale regels voor het betreden van
  natuurgebieden. Gebruik alleen dood materiaal als je (natuurlijke) spoortekens gebruikt, houd rekening
  met wilde dieren (maak geen lawaai), ruim na afloop eventuele spoortekens op en laat geen afval achter.
