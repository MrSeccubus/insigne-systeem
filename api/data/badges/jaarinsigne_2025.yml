  *NB. Voor elke activiteiten is een download met spelbeschrijving beschikbaar.*

  Het Wijs met drinkwater jaarinsigne 2025 is iets wat je als individu of als groep in elke leeftijdscategorie binnen Scouting kunt doen. Dit insigne is tot stand gekomen in samenwerking met Vitens. Vitens is het grootste drinkwaterbedrijf in Nederland. Vitens vindt het belangrijk om kennis over het duurzaam gebruik van schoon drinkwater over te dragen aan jeugd.
