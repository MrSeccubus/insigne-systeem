{% if error %}
<p class="form-error">{{ error }}</p>
{% endif %}
<form hx-post="/login" hx-target="#form-area" hx-swap="innerHTML">
    <div class="field">
        <label for="email">E-mailadres</label>
        <input type="email" id="email" name="email" required autofocus placeholder="jij@voorbeeld.nl"
               value="{{ email or '' }}">
    </div>
    <div class="field" x-data="{ show: false }">
        <label for="password">Wachtwoord</label>
        <div class="field-password">
            <input :type="show ? 'text' : 'password'" id="password" name="password" required autocomplete="current-password">
            <button type="button" class="btn-show-password" @click="show = !show" x-text="show ? 'Verbergen' : 'Tonen'"></button>
        </div>
    </div>
    <button type="submit" class="btn-primary">Inloggen</button>
</form>
<div class="auth-footer">
    <a href="/forgot-password">Wachtwoord vergeten?</a>
    &nbsp;·&nbsp;
    Nog geen account? <a href="/register">Registreren</a>
</div>
