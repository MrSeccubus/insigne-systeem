slug: explorer_jaarbadge
titel: Explorer Jaarbadge
niveau_label: Jaarbadge
niveau_label_kort: J
introductie: |
  ***Deze explorer jaarbadge is er voor jouw persoonlijke ontwikkeling.***

  Ieder jaar dat je explorer bent, leer je iets anders. Na je installatie leer je de afdeling kennen,
  maak je voor het eerst zelf programma's en doe je actief mee tijdens opkomsten en kampen. In je
  tweede jaar als explorer weet je al precies hoe alles werkt. Je kunt zelf een opkomst organiseren
  en kijkt met de oudere explorers mee hoe je een weekend of de expeditie organiseert. Tijdens jouw
  derde jaar als explorer regel je de organisatie van de afdeling en neem je grotere projecten op je.

  Om het maximale uit je explorertijd te halen, zijn er voor ieder jaar bepaalde activiteiten
  vastgesteld die je gedaan moet hebben. Als je aan die eisen voldoet, krijg je aan het einde van
  het Scoutingjaar een jaarbadge.
eisen:
  - eisen:
      - Installatie bij de explorers.
      - Je hebt jaarbadge 1 gehaald
      - Je hebt jaarbadge 2 gehaald
  - eisen:
      - Een insigne behalen in een activiteitengebied naar keuze.
      - Een insigne behalen in een ander activiteitengebied dan het jaar ervoor.
      - Een insigne behalen in een ander activiteitengebied dan voorgaande jaren.
  - eisen:
      - Organiseren van ten minste drie gewone opkomstprogramma's.
      - Gespreksleider zijn bij drie evaluaties.
      - Coördineren van de organisatie van een groot project, zoals een weekendkamp of een regioactiviteit.
  - eisen:
      - Actief deelnemen aan drie evaluaties.
      - Meehelpen met het organiseren van een grote activiteit zoals een groeps- of regioactiviteit.
      - Samen met andere explorers de verantwoordelijkheid nemen voor de organisatie van de expeditie.
  - eisen:
      - Deelnemen aan ten minste één weekendkamp.
      - Meehelpen met het organiseren van ten minste één weekendkamp.
      - Een functie in het afdelingsbestuur of een vergelijkbare functie vervullen.
  - eisen:
      - Meedoen aan een Scoutingactiviteit buiten je eigen groep, bijvoorbeeld samen met een andere Scoutinggroep of deelnemen aan een regioactiviteit.
      - Deelnemen aan een activiteit buiten je regio, zoals de HIT of de Nationale Jamboree.
      - Ten minste één keer als explorer naar het buitenland op expeditie zijn geweest.
  - eisen:
      - Deelnemen aan de expeditie.
      - Meehelpen aan de organisatie van de expeditie.
      - De kwaliteitstest voor explorers invullen en bespreken met je begeleiding of ten minste twee andere explorers.
  - eisen:
      - ""
      - ""
      - Twee keer een activiteit organiseren voor een bever- of welpenspeltak, bijvoorbeeld het uitzetten van een speurtocht.
