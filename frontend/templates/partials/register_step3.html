{% if error %}
<p class="form-error">{{ error }}</p>
{% endif %}
<p class="form-hint">Bijna klaar! Kies een naam en wachtwoord.</p>
<form hx-post="/register/activate" hx-target="#form-area" hx-swap="innerHTML">
    <input type="hidden" name="setup_token" value="{{ setup_token }}">
    <div class="field">
        <label for="name">Naam <span class="optional">(optioneel)</span></label>
        <input type="text" id="name" name="name" autofocus autocomplete="name" placeholder="Jan">
    </div>
    <div class="field" x-data="{ show: false }">
        <label for="password">Wachtwoord</label>
        <div class="field-password">
            <input :type="show ? 'text' : 'password'" id="password" name="password" required autocomplete="new-password" minlength="8">
            <button type="button" class="btn-show-password" @click="show = !show" x-text="show ? 'Verbergen' : 'Tonen'"></button>
        </div>
        <span class="field-hint">Minimaal 8 tekens.</span>
    </div>
    <button type="submit" class="btn-primary">Account aanmaken</button>
</form>
