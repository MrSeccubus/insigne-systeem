base_url: "http://localhost:8000"

admins:
  - admin@example.com

allow_any_user_to_create_groups: true

database:
  url: "sqlite:///:memory:"

jwt:
  secret_key: "test-secret-key-not-for-production"
  algorithm: HS256
  expire_days: 30

email:
  smtp_host: ""
  from_address: "noreply@insigne.nl"
  from_name: "Insigne Systeem"

# Off by default in the test suite so repeated register/forgot-password/contact
# calls aren't throttled; the rate-limit tests flip config.rate_limit.enabled on.
rate_limit:
  enabled: false

# Off by default in the test suite so the existing register/contact tests don't
# have to solve a proof-of-work; the captcha tests flip config.captcha.enabled on.
captcha:
  enabled: false
