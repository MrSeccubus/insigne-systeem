slug: bemanningslid
titel: Insigne Bemanningslid
introductie: |
  **Dit insigne maakt deel uit van het activiteitengebied Uitdagende Scoutingtechnieken.**
  Op niveau 1 en 2 ben je actief op een lelievlet, bij niveau 3 op een sleper, motorschip of wachtschip.
  Welkom aan boord! Bij dit insigne leer je als goed bemanningslid te functioneren.
eisen:
  - naam: De basis
    eisen:
      - |
        Om veilig het water op te kunnen gaan als bemanningslid moet je voldoen aan een aantal basiseisen.
        a. Toon aan dat je kunt zwemmen, bijvoorbeeld door je zwemdiploma A te laten zien.
        b. Je weet hoe het roer werkt. Vaar een rechte koers op een vast punt. Je hoeft hierbij niet de zeilen of het zwaard te bedienen.
      - |
        Om als goed bemanningslid mee te kunnen varen, voldoe je aan een aantal basiseisen voor roeien en zeilen. Deze basiseisen kun je aantonen door te voldoen aan één eis van iedere groep.

        **Groep 1 – Roeien:** 
        - Insigne Varen op Spierkracht niveau 1 variant roeien
        - Watersportdiploma Roeien (CWO I/II).
        

        **Groep 2 – Zeilen**
        - Watersportdiploma Jeugdzeilen (CWO)
        - Watersportdiploma Kielboot (CWO I)
        - Ken de schaal van Beaufort en de zeilkoersen van een lelievlet.
      - tekst: |
          Aan een goede vaartocht gaat een goede voorbereiding vooraf. Je treft de nodige voorbereidingen op een sleper, motorschip of wachtschip. 
          a.  Help het schip klaar te maken om uit te varen door te zorgen dat alle materialen compleet zijn, controleer de motor en alle vereiste veiligheidsmiddelen.
          ==b. Laat zien hoe je klein/dagelijks onderhoud aan de motor uitvoert.==
        groen: true
  - naam: Kennis van je schip
    eisen:
      - |
        Goede bemanningsleden kennen de termen aan boord. Voer de volgende twee eisen beiden uit.
        a.  Herken de vijftien belangrijkste onderdelen van een vlet:
          - Voordek 
          - Achterdek
          - Roer
          - Doft
          - Vlonder / buikdenning
          - Zijstag
          - Voorstag
          - Mast
          - Fok
          - Grootzeil
          - Anker
          - Dol
          - Riem
          - Wrikriem
          - Hoosblik

        b.  Leg uit wat deze vijftien belangrijke vaartermen betekenen:
          - Bakboord
          - Stuurboord
          - Overstag
          - Gijp
          - Hogerwal
          - Lagerwal
          - Roeien
          - Zeilen
          - Wrikken
          - Oploeven
          - Afvallen
          - Noord
          - Oost
          - Zuid 
          - West
      - |
        Veiligheidsregels zijn belangrijk aan boord. 
        a. Leg uit wat de verschillen zijn tussen zwemvesten, reddingsvesten en self-inflatables.
        b. Leg uit hoe je veilig vanuit de kuip kunt werken.
        c. Vertel waar je in jouw vaaromgeving wel en niet veilig kunt of mag zwemmen.
        d. Leg uit wat de risico's zijn als je op het water zwanen of ganzen tegenkomt.
      - |
        Het is belangrijk dat je er op bent voorbereid als er aan boord iets mis gaat. 
        a. Vertel waar alle veiligheidsmiddelen aan boord te vinden zijn en hoe je ze kunt gebruiken.
        b. Maak een veiligheidsplattegrond van het schip.
  - naam: Vaardigheden
    eisen:
      - |
        Om als goed bemanningslid mee te kunnen varen heb je basiskennis van enkele knopen nodig. 
        a.  Leg uit wanneer je de volgende knopen toepast: 
          - achtknoop
          - mastworp
          - paalsteek
          - kikker beleggen
          - halve steek

        b.  Laat zien hoe je de lijnen netjes opbergt.
      - |
        Bij aanleggen, ankeren en slepen is een goed bemanningslid onmisbaar. 
        a.  Laat zien hoe je het schip aanlegt en op welke manier je de landvasten gebruikt. Voer dit uit tijdens het aanleggen aan vaste wal, steiger of brug. 
        b.  Leg het anker goed klaar, werp het correct uit, controleer of het goed ligt en maak het weer los.
        c.  Hanteer de basisveiligheidsregels tijdens het slepen (volgens de [NTR](https://www.scouting.nl/bestuur/afspraken-maken/ntr-veiligheid-op-het-water) en je groepsregels).
        d.  Pak een sleeplijn aan en leg hem vast.
        e.  Toon aan hoe je het zwaard van een lelievlet moet gebruiken tijdens het slepen.
        f.  Laat zien hoe je een puts of emmer gebruikt om af te remmen tijdens het slepen.
      - |
        Bij aanleggen, ankeren en slepen is een goed bemanningslid onmisbaar op het schip.
        a.  Leg een schip vast in een sluis en laat daarbij zien wat je met de lijnen moet doen.
        b.  Beleg stilstaand een bolder.
        c.  Leg het anker goed klaar, werp het correct uit, controleer of het goed ligt en maak het weer los.
        d.  Noem twee typen sleeplijnen.
        e.  Noem en coördineer twee soorten sleepopstellingen.
  - naam: Veiligheid
    eisen:
      - tekst: |
          Een verantwoord bemanningslid weet hoe je moet omgaan met gevaren aan boord.
          a.  Leg uit wat goede kleding en schoeisel is aan boord van een lelievlet. 
          b.  Vertel wat de regels zijn voor het dragen van reddingsvest, zoals in de [NTR](https://www.scouting.nl/bestuur/afspraken-maken/ntr-veiligheid-op-het-water) staat.
          c.  Oefen het op tijd bukken met een gecontroleerde gijp.
          d.  Sta en loop niet in de boot en houd je handen binnenboord tijdens het varen.
          e.  Benoem de vaarregel voor goed zeemanschap. 
          f.  Benoem hoe je op een goede manier met de natuur (planten, dieren, afval) op en rond het water moet omgaan. 
        groen: true
      - |
          Soms kan een lelievlet toch omslaan.  
          a.  Leg uit wat je moet doen als de lelievlet omgeslagen is:
          - Veiligheidsmaatregelen van en voor bemanningsleden
          - Veiligstellen van het materiaal
          - Alarmeren van hulpdiensten      
      - |
        Communicatie aan boord en tussen schepen is belangrijk.
        a.  Weet hoe je communicatiemiddelen op het water correct moet gebruiken: 
        - Gebruik van PMR of LPD portofoons.
        - Gebruik van mobiele telefoon.
        - Basiskennis van marifoon.
        - SOS signalen/ noodsignalen.


        _Lees de toelichting!_
  - naam: Spic en span
    eisen:
      - |
        Als bemanningslid help je ook een handje aan boord.
        a.  Laat zien hoe je bagage aan boord netjes en watervast opbergt. 
        b.  Leg een boot aan en leg een landvast aan een kikker.
        c.  Pak een sleeplijn aan op een klein zeilbootje (zoals een optimist) en maak deze goed vast.
      - tekst: |
          Als je goed omgaat met materiaal gaat je boot langer mee. 
          a.  Laat zien hoe je zeilen uithangt na het varen, als ze nat zijn geworden.
          b.  Laat zien hoe je lijnen uitspoelt, nadat er bijvoorbeeld zand in is gekomen.
          c.  Voer minimaal twee onderhoudstaken uit tijdens groot onderhoud van de lelievlet, zoals schuren of schilderen. Zorg dat je afval netjes opruimt en scheidt.
        groen: true
      - tekst: |
          Onderhoud zorgt ervoor dat je schip langer mee gaat.
          a.  Voer minimaal twee onderhoudstaken uit tijdens groot onderhoud van het schip. Weet welke onderhoudsmiddelen duurzamer zijn en kies binnen de mogelijkheden van je groep voor de duurzaamste opties.
          b.  Assisteer bij groot onderhoud aan de motor.
        groen: true
nawoord: |
  # Toelichting Insigne Bemanningslid

  **Algemeen**
  Bij niveau 3 wordt met ‘schip’ steeds een sleper, wachtschip of motorschip bedoeld, zoals bij de eerste eis staat vermeld. 

  **Insigne Bemanningslid voor niet-waterscouts**
  Niveau 1 is zonder aanpassingen uitvoerbaar voor niet-waterscouts. Voor niveau 2 en 3 is meer ervaring met varen nodig. Voor dit soort insignes is het goed om contact te leggen met een waterscoutinggroep. Zij hebben veel vaarmateriaal en weten hier goed mee om te gaan. Binnen de richtlijnen van Scouting Nederland, de Nautisch Technische Richtlijnen (NTR), is het ook verplicht om begeleiding met passende kwalificaties bij de activiteit te hebben. 

  **Toelichting bij het gebruik van communicatiemiddelen**
  PMR en LPD portofoons en mobiele telefoons maken gebruik van open netwerken. Verstoringen in de communicatie zijn daarbij mogelijk. Daarnaast is monitoring door de relevante hulpdiensten niet aanwezig. Voor gebruik van een marifoon dien je op de juiste wijze gecertificeerd te zijn. 

  **Aansluitende kwalificaties/watersportdiploma’s:**
  Per niveau zijn er verschillende kwalificaties of watersportdiploma’s waar het insigne Bemanningslid op aansluit. Dit insigne kan gebruikt worden als opstapje daarvoor.

  <u>Vanaf niveau 1:</u>
  Niveau 1 en 2 van dit insigne laat je kennismaken met de basistechnieken van het zeilen en/of roeien. Na deze twee niveaus heb je een goede basis om met een watersportdiploma Roeien te starten. Dit is een relatief kleine stap. De organisatie van watersportdiploma’s is volop in ontwikkeling (zie [https://watersportdiploma.nl/opleidingen](https://watersportdiploma.nl/opleidingen)). Zodra hier meer informatie over bekend is, wordt dit aan deze toelichting toegevoegd.  

  <u>Vanaf niveau 3:</u>
  Niveau 3 van dit insigne laat je kennismaken met een aantal vaardigheden die je ook nodig hebt voor sloep of motorvlet. Dit insigne kun je gebruiken als  eerste stap richting een watersportdiploma sloep en motorvlet. De organisatie van watersportdiploma’s is volop in ontwikkeling (zie https://watersportdiploma.nl/opleidingen). Zodra hier meer informatie over bekend is, wordt dit aan deze toelichting toegevoegd.  

  **Handige links en informatie:**
  Voor spelen op en rond het water zijn veel voorbeelden te vinden op de Activiteitenbank, kies dan voor locatie ‘Op en om het water’, 
  [https://activiteitenbank.scouting.nl/](https://activiteitenbank.scouting.nl/). 
