slug: vredeslicht
titel: Insigne Vredeslicht
introductie: |
  Het insigne Vredeslicht is een buiten gewoon insigne en wordt uitgegeven door Stichting
  Vredeslicht Scouting Nederland in samenwerking met de ScoutShop.

  Met dit insigne ontdekken scouts van alle leeftijden de kracht van het Vredeslicht: waar het vandaan
  komt, wat het betekent en hoe je zelf licht kunt verspreiden in je omgeving. Door middel van onderzoek,
  creatieve opdrachten en actieve deelname ervaren scouts wat vrede en verbondenheid inhouden.
eisen:
  - naam: Geschiedenis
    eisen:
      - |
        Ontdek waar het Vredeslicht vandaan komt en hoe het er uit ziet.
        a. Bekijk filmpjes op internet over de reis van het Vredeslicht naar Nederland.
        b. Knutsel de vlag van Oostenrijk.
        c. Maak een tekening van een lantaarn voor het Vredeslicht.
      - |
        Het Vredeslicht is een internationaal evenement dat in meerdere landen wordt gevierd.
        a. Onderzoek hoe het Vredeslicht is ontstaan in Oostenrijk.
        b. Zoek uit via welke routes het Vredeslicht naar Nederland komt.
        c. Welke landen nemen deel aan de internationale viering?
        d. Hoeveel landen ken jij waar het Vredeslicht naar toe reist?
        e. Ontwerp een quiz over de herkomst van het Vredeslicht en speel deze in je speltak of met je staf.
      - |
        Het Vredeslicht kent een bijzondere geschiedenis dat je met anderen kunt delen.
        a. Schrijf een kort artikel of blog over de geschiedenis van het Vredeslicht, alsof het in een krant of online platform komt te staan.
        b. Ontwerp een tijdlijn (digitaal of op papier) met de belangrijkste mijlpalen in de geschiedenis van het Vredeslicht en presenteer die aan je groep.
        c. Ontwerp een "Ren je rot"-spel over de geschiedenis van het Vredeslicht en voer dit uit met je groep.
  - naam: Reis en verspreiding
    eisen:
      - |
        Het Vredeslicht maakt een verre reis voordat het in Nederland aankomt.
        a. Knutsel een routekaart van Oostenrijk naar Nederland.
        b. Maak een vlaggenlijn met alle landen waar het licht heen gaat.
        c. Vertel tijdens de opkomst aan jouw groep hoe het licht reist.
      - |
        Het Vredeslicht wordt over de hele wereld verspreid.
        a. Zoek uit via welke manieren het Vredeslicht zich wereldwijd verspreid.
        b. Welke drie belangrijke rollen worden elke reis naar Oostenrijk opnieuw uitgekozen door Vredeslicht Nederland?
        c. Bedenk 5 vragen voor het Vredeslicht kind en speel het interview na.
      - |
        Deel het avontuur en de verspreiding van het Vredeslicht met anderen.
        a. Maak een overzicht van deelnemende landen wereldwijd.
        b. Schrijf een verslag over de internationale verspreiding.
        c. Ontwerp een presentatie of video waarin je uitlegt hoe de reis verloopt van het ophalen, naar de internationale verspreiding en de reis naar Nederland.
  - naam: Betekenis en vredesgedachte
    eisen:
      - |
        Met het Vredeslicht draag je de vredesgedachte uit.
        a. Teken of schrijf wat vrede voor jou betekent en vertel dit aan je leiding.
        b. Schrijf een vredeswens op voor iemand anders in je omgeving.
        c. Leer een kort liedje of gedicht dat bij vrede past en draag dit voor in je groep.
        d. Plant een bloembol of boompje als symbool voor vrede en licht.
      - |
        Deel de vredesgedachte met anderen.
        a. Schrijf 10 kaartjes met een positieve boodschap over vrede en deel ze uit aan bekenden of vrienden in je omgeving.
        b. Organiseer een klein moment met je groep waarbij iedereen één wens of gedachte voor vrede uitspreekt.
        c. Maak een collage (digitaal of op papier) van kranten, tijdschriften of eigen foto's waarin je laat zien wat vrede voor jou betekent.
      - |
        Deel het avontuur en de verspreiding van het Vredeslicht met anderen.
        a. Schrijf een interview over wat het Vredeslicht voor iemand betekent (bijv. staflid, ouder) en neem het af.
        b. Organiseer een activiteit waarin je het thema 'vrede' bespreekt met jongere speltakken (spel, verhaal, gesprek).
        c. Ontwerp een poster of social media post die laat zien hoe jij het Vredeslicht en vrede zou uitdragen.
        d. Onderzoek hoe het Vredeslicht verbonden is met het landgoed 'Zeewolde' en wat de betekenis hierachter is (tip: kijk op https://Vredeslicht.nl).
  - naam: Creatief en duurzaam
    eisen:
      - |
        Laat je fantasie de vrije loop en creëer je eigen vredeskunstwerk.
        a. Versier een stompkaars met stiften of kaarsvet (onder toezicht van een volwassene).
        b. Knutsel een 'Vredeslantaarn' met gerecyclede materialen (wc-rol, melkpak, glazen pot) en plaats daar een Vredeslichtje in.
        c. Verzamel bladeren en maak er een natuurcollage van met het woord "Vrede".
        d. Geef iemand buiten je familie een knutselwerkje of tekening met een vredeswens.
      - |
        Creëer je eigen vredeskunstwerk met woorden en gerecycled materiaal.
        a. Maak een lantaarn van een oud leeg blik en sla een licht patroon met spijkers in het blik.
        b. Schrijf een vredeslicht wens van minimaal 2 alinea's en draag dat voor.
        c. Maak een nieuwe kaars van oude gebruikte kaarsen.
      - |
        Het Vredeslicht wordt over de hele wereld verspreid.
        a. Organiseer een opkomst waarbij vredeslantaarns worden gemaakt voor de eigen of een andere (jongere) speltak en verspreid zo het Vredeslicht.
        b. Ontwerp een plan om het Vredeslicht op nog een andere duurzame manier in je groep te verspreiden (bijv. zonder wegwerp kaarsjes, met fietstocht i.p.v. auto).
  - naam: Evenement en eigen bijdrage
    eisen:
      - |
        Je ervaart hoe het Vredeslicht in je groep gedeeld wordt en draagt daar zelf aan bij.
        a. Neem deel aan een Vredeslicht activiteit of evenement bij je eigen groep of in de buurt en neem het Vredeslicht mee.
        b. Breng het Vredeslicht naar iemand uit je familie of buurt.
      - |
        Je ervaart hoe het Vredeslicht in Nederland gedeeld wordt en helpt mee dit te verspreiden.
        a. Kom als deelnemer naar de manifestatie van Vredeslicht Nederland.
        b. Nodig iemand uit buiten scouting (bijv. school, vereniging) om het Vredeslicht mee te maken en vertel erover.
        c. Help mee met de verspreiding van het Vredeslicht binnen je scoutinggroep of dorp.
        d. Maak een verslag of filmpje van jullie actie en deel dit binnen je groep/social media.
      - |
        Je ervaart hoe het Vredeslicht internationaal gedeeld wordt en helpt mee dit te verspreiden.
        a. Neem deel aan de internationale Vredeslicht reis en viering met Vredeslicht Nederland.
        b. Organiseer zelf een verspreiding actie in je wijk of school, bijvoorbeeld met een lantaarnoptocht of -wandeling met vredeslichtjes in de buurt of dorp.
        c. Nodig hiervoor andere Scoutinggroepen of organisaties uit om aan deel te nemen.
        d. Ontwerp hiervoor een flyer of uitnodiging voor een Vredeslicht activiteit.
        e. Documenteer de reis en verspreiding met een video, fotoverslag of presentatie en deel dit met de groep/omgeving en met de Stichting Vredeslicht Scouting Nederland.
nawoord: |
  Er is veel informatie te vinden op internet, hieronder zijn verschillende informatiebronnen. Sommige
  opdrachten vragen om extra (brand)veiligheid en begeleiding, hou hier rekening mee. De inschrijvingen
  voor de evenementen worden gepost op de socials van Vredeslicht Nederland.

  Informatiebronnen:
  https://Vredeslicht.nl
  https://nl.scoutwiki.org/Vredeslicht
  https://friedenslicht.orf.at/navigation/international/index.html
