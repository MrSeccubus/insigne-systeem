<form hx-post="/register" hx-target="#form-area" hx-swap="innerHTML">

        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required autofocus placeholder="jij@example.com">

    <button type="submit" class="btn-primary">Continue</button>
</form>
