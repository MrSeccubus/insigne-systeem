slug: identiteit
titel: Insigne Identiteit
introductie: |
  Dit insigne maakt deel uit van het activiteitengebied Identiteit.
  Bij dit activiteitengebied doe je activiteiten die te maken hebben met wie je zelf bent (zelfbeeld),
  je levensovertuiging en de identiteit van je groep. Met dit insigne ga je aan de slag met wat jou
  en jouw groep uniek maakt en hoe je naar jezelf en anderen kijkt.
eisen:
  - naam: Ik
    eisen:
      - |
        a. Teken of schilder een zelfportret. Noteer daarbij welke hobby's en talenten je hebt.
        b. Maak een foto van jezelf in de natuur en voeg deze toe aan het portret. Leg daarbij uit wat je graag doet in de natuur en waarom de natuur belangrijk voor je is.
      - |
        a. Vraag vijf mensen om te delen waar jij goed in bent en waarom.
        b. Vraag vijf mensen om te delen waar jij je nog in kunt ontwikkelen.
        c. Kies een ontwikkelpunt en stel een plan op voor de komende één à twee maanden.
        d. Evalueer samen met je leiding de voortgang na afloop.
      - |
        a. Schrijf een gedicht of lied dat iets vertelt over jezelf of wat Scouting voor jou betekent.
        b. Draag het voor aan je speltak en leg uit wat de gedachten achter je tekst zijn.
  - naam: Familie
    eisen:
      - |
        a. Ontwerp een stamboom van drie generaties met volledige namen en foto's (indien mogelijk). Noteer uiterlijke gelijkenissen.
        b. Vul de stamboom aan met karaktereigenschappen. Praat hierover met familieleden.
        c. Bekijk alle eigenschappen op de stamboom en noteer welke eigenschappen je in jezelf herkent.
      - |
        Kies en voer uit: eis a en b, óf eis c.
        a. Onderzoek welke gebruiken en gewoontes er in jouw familie zijn. Voer er een uit met je speltak.
        b. Leg uit waar deze gebruiken vandaan komen en wat het doel ervan is.
        c. Vraag je vrienden naar de gebruiken in hun families. Kies er een, onderzoek de oorsprong en voer het uit.
      - |
        a. Beschrijf hoe dit fictieve familielid zou heten, eruit zou zien, waar die vandaan zou komen en waarom je voor deze kenmerken hebt gekozen.
        b. Speel het spel 'Blij met je ei' om een band te vormen met dit fictieve familielid.
  - naam: Wet en belofte
    eisen:
      - |
        a. Leer de wet en belofte uit je hoofd. Vertel in je eigen woorden wat de wet en belofte voor jou betekenen.
        b. Bedenk twee manieren hoe je de normen en waarden uit de wet en belofte buiten Scouting kunt toepassen. Voer deze acties uit en deel de resultaten.
      - |
        a. Geef een presentatie over welke waarde de natuur voor jou heeft en welke waarden je belangrijk vindt.
        b. Ontwikkel een plan om met jouw waarden de natuur te verbeteren.
        c. Voer je natuurverbeterplan uit en evalueer het resultaat.
      - |
        a. Reflecteer op de betekenis van: 'Ik wil samen met anderen het goede zoeken en bevorderen'. Beschrijf wat 'het goede' voor jou inhoudt binnen Scouting.
        b. Ontwikkel een plan om actief bij te dragen aan het bevorderen van 'het goede'. Voer dit plan uit en deel je ervaringen.
  - naam: Symbolieken en tradities
    eisen:
      - |
        a. Beschrijf de symbolen uit het installatieteken van Scouting Nederland en leg uit wat die symbolen betekenen.
        b. Beschrijf de symbolen uit het logo van jouw Scoutinggroep en -regio.
        c. Ontwerp een logo voor je vaste subgroep, speltak of Scoutinggroep. Gebruik symbolen die laten zien waar jullie voor staan.
      - |
        a. Beschrijf hoe de volgende tradities in jouw groep aan bod komen: dragen van een das, geven van de linkerhand, openen/sluiten van een opkomst, brengen van een saluut, overvliegen, installeren van nieuwe leden.
        b. Onderzoek of jouw groep unieke symbolen en tradities heeft.
        c. Verken de unieke symbolen en tradities van een andere Scoutinggroep (bijv. via een bezoek). Probeer die uit in je eigen speltak.
      - |
        Kies: eis a, c en d (individueel) of eis b, c en d (samen).
        a. Beschrijf de waarden die jij belangrijk vindt en vat deze samen in een persoonlijk motto.
        b. Beschrijf de waarden van je vaste subgroep of speltak en vat samen in een motto.
        c. Ontwerp een logo of huisstijl bij je motto. Geschikt voor een badge of T-shirt.
        d. Leg uit wat je motto en logo betekenen en waarom deze bij jou passen.
  - naam: Verschillende culturen
    eisen:
      - |
        a. Beschrijf de samenstelling van de speltakken in jouw groep. Leg ook uit hoe dit is ontstaan.
        b. Maak een lijst van de dorpen, streken en steden waar de leden van jouw speltak vandaan komen.
      - |
        a. Inventariseer de verschillende culturen en geloofsovertuigingen binnen je speltak.
        b. Noteer de feestdagen die gevierd worden en benoem eventuele overeenkomsten.
        c. Kies een feestdag die je zelf nog niet kent en organiseer een passende activiteit.
      - |
        a. Vergelijk hoe natuur wordt beleefd in Nederland met een land of cultuur waar de natuurbeleving anders is.
        b. Presenteer de verschillen aan je speltak en geef je mening.
