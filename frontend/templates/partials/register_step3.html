{% if error %}
<p class="form-error">{{ error }}</p>
{% endif %}
<p class="form-hint">Almost there! Choose a name and password.</p>
<form hx-post="/register/activate" hx-target="#form-area" hx-swap="innerHTML">
    <input type="hidden" name="setup_token" value="{{ setup_token }}">
    <div class="field">
        <label for="name">Name <span class="optional">(optional)</span></label>
        <input type="text" id="name" name="name" autofocus autocomplete="name" placeholder="Jan">
    </div>
    <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">
        <span class="field-hint">At least 8 characters.</span>
    </div>
    <button type="submit" class="btn-primary">Create account</button>
</form>
