<form hx-post="/register" hx-target="#form-area" hx-swap="innerHTML">
    <div class="field">
        <label for="email">E-mailadres</label>
        <input type="email" id="email" name="email" required autofocus placeholder="jij@voorbeeld.nl">
    </div>
    <button type="submit" class="btn-primary">Doorgaan</button>
</form>
<div class="auth-footer">
    Heb je al een account? <a href="/login">Inloggen</a>
</div>
