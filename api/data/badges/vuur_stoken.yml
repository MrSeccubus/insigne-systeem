slug: vuur_stoken
titel: Insigne Vuur stoken
introductie: |
  Dit insigne maakt deel uit van het activiteitengebied Uitdagende Scoutingtechnieken.
  In dit activiteitengebied doe je activiteiten rondom een techniek, zoals hakken, stoken, kaart en kompas,
  routetechnieken, pionieren, zeilen en kamperen. Vuur stoken, één van de leukste dingen om te doen
  binnen Scouting, maar hoe doe je dat en belangrijker: hoe doe je dat veilig en verantwoord? Met dit
  insigne leer je allerlei toepassingen, vanaf het klaarmaken van de kampvuurplaats tot aan het aansteken
  van een vuur zonder aanstekers of lucifers.
eisen:
  - naam: Vuur en veiligheid
    eisen:
      - |
        Niveau 1.
        Een goede voorbereiding is belangrijk voor de veiligheid.
        a. Je bezit de basiskennis van de vuurdriehoek. Teken de vuurdriehoek en licht deze toe.
        b. Laat zien dat je weet welke voorzorgsmaatregelen je moet nemen voordat je begint met vuur stoken, door bijvoorbeeld een stookplek veilig te maken en blusmiddelen te verzamelen en op de juiste plek neer te zetten.
        c. Je weet wat je moet doen als je per ongeluk toch je vingers brandt aan het vuur.
      - |
        Niveau 2.
        Je begrijpt hoe vuur werkt en hoe je daar bij het aanleggen van een vuurplek rekening mee kunt houden.
        a. Je weet welk effect de wind op je vuur heeft en waar je op moet letten bij het stoken met de windrichting.
        b. Je kunt, op basis van de vuurdriehoek, uitleggen hoe vuur werkt en hoe het doven van een vuur werkt. Van elk onderdeel van de vuurdriehoek kun je bovendien enkele voorbeelden noemen.
        c. Je kunt laten zien dat je weet hoe je een vuurplek kunt inrichten voor een klein vuur voor je subgroep, waarbij je rekening houdt met de veiligheid.
      - |
        Niveau 3.
        Veiligheid rond het kampvuur, jij weet hoe je daar in je voorbereiding rekening mee houdt.
        a. Naast de vuurdriehoek bezit je ook de basiskennis van de vuurvijfhoek.
        b. Richt een volledige kampvuurplek in, die aan alle veiligheidseisen voldoet. Zorg ervoor dat de hele groep veilig rond het kampvuur kan zitten. Denk daarbij aan vluchtroute, brandhout, afstand tot het vuur, windrichting en blusmiddelen.
        c. Beschrijf het verschil tussen een oppervlakkige, gedeeltelijke en volledige verbranding en wat je moet doen als iemand zich verbrandt.
  - naam: Materialen
    eisen:
      - |
        Niveau 1.
        Om goed vuur te kunnen maken heb je de juiste materialen nodig.
        a. Loop buiten rond het Scoutinggebouw en kijk wat je aan droog sprokkelhout kunt vinden om vuur mee te maken. Let daarbij op dat het materiaal droog is.
        b. Leg uit waarom droog hout belangrijk is, en hoe je dat kunt zien of voelen.
        c. Je kent verschillende aanmaakmaterialen zoals aanmaakblokjes, eierdoos en berkenschors. Gebruik drie verschillende soorten aanmaakmiddelen om (eventueel met je leiding) een klein vuurtje mee te maken.
      - |
        Niveau 2.
        Je hebt kennis van vaste brandstoffen en aanmaakmaterialen uit de natuur.
        a. Je weet welke brandstoffen in vaste vorm er zijn die je veilig kunt gebruiken en hoe je ze kunt gebruiken.
        b. Je weet ook welke brandstoffen in vaste vorm extra vervuilend zijn en juist niet moet gebruiken.
        c. Je kent minimaal drie aanmaakmaterialen die je in de natuur kunt vinden en maakt zelf een aantal aanmaakblokjes van meerdere natuurlijke materialen.
      - |
        Niveau 3.
        Kennis van brandbare (vloe)istoffen is belangrijk om mogelijkheden en risico's goed in te kunnen schatten.
        a. Je kent minimaal drie verschillende soorten brandbare vloeistoffen en de gevaren ervan.
        b. Beschrijf de brandwaarde en voordelen/nadelen van ten minste vijf veel in Nederland voorkomende houtsoorten.
        c. Leg uit welke houtsoorten je het beste kunt gebruiken voor een schoner vuur (minder rook en schadelijke stoffen).
        d. Maak zelf één van de twee aanmaakmaterialen: houtskool of charcloth (verkoold katoen).
  - naam: Opbouw en soorten vuur
    eisen:
      - |
        Niveau 1.
        Om een vuur goed te laten branden is een goede opbouw belangrijk.
        a. Bouw van droge takjes een klein piramidevuurtje op in een vuurton of kampvuurkuil.
      - |
        Niveau 2.
        Er zijn verschillende manieren om een vuur op te bouwen.
        a. Je kent vijf manieren om een vuur op te bouwen.
        b. Bouw drie verschillende soorten vuurtjes. Kijk en beschrijf wat de voor- en nadelen zijn.
      - |
        Niveau 3.
        Er zijn verschillende soorten vuur met verschillende doeleinden.
        a. Je kent minstens vijf vuursoorten voor vijf verschillende doeleinden.
        b. Bouw vervolgens minimaal drie vuren waarvan: minimaal één grondvuur en minimaal één vuur op werkhoogte.
  - naam: Speciale technieken
    eisen:
      - |
        Niveau 1.
        Je kunt vuurtjes op verschillende manieren aansteken.
        a. Steek een klein vuurtje aan met lange lucifers.
        b. Maak een duurzaam kampvuur zonder hout, vuur of rook, in een vuurkorf met lichtjes en gekleurd papier.
      - |
        Niveau 2.
        Je kunt een vuur met weinig hulpmiddelen en ook zonder lucifers of aansteker aanmaken.
        a. Steek je startvuurtje aan met slechts één lucifer!
        b. Zoek uit hoe je op een andere manier dan met lucifers een vuur kunt aanmaken. Zoek daarbij minimaal vier technieken op.
        c. Laat zien dat je minimaal twee technieken beheerst om vuur te maken zonder lucifers of aansteker te gebruiken.
      - |
        Niveau 3.
        Als kampvuurspecialist ken je verschillende technieken om vuur te maken.
        a. Gebruik een spectaculaire manier om het kampvuur aan te steken, zoals op afstand met een accu of met een fakkel.
        b. Ontsteek een vuur met de vuurrol techniek.
        c. Beheers twee van de volgende technieken: Lets vuur, Zweedse fakkel, kaarsvet fakkel, houtvergasser van blikken.
  - naam: Vuur doven
    eisen:
      - |
        Niveau 1.
        Na afloop moet het vuur weer op een veilige manier uitgemaakt worden.
        a. Beschrijf hoe je vuur kunt uitmaken en maak daarbij gebruik van je kennis van de vuurdriehoek.
        b. Doof een klein vuurtje met zand of water.
      - |
        Niveau 2.
        Goed een vuur doven is meer dan een paar emmers water er overheen gooien.
        a. Bedenk voor ieder onderdeel van de vuurdriehoek twee manieren om het vuur uit te maken.
        b. Doof het vuur op een manier dat je kolen overhoudt die je de volgende ochtend kunt gebruiken om een nieuw vuur te starten.
        c. Maak een vuurtje uit met slechts één mokje water.
      - |
        Niveau 3.
        Uit is echt uit… of toch niet?
        a. Doof het kampvuur, maar zorg ervoor dat je een methode hebt zodat je de warmte van het vuur mee kunt nemen om bijvoorbeeld op een andere plek vuur te maken.
