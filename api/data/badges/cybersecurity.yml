slug: cybersecurity
titel: Insigne Cybersecurity
introductie: |
  Het insigne Cyber Security is een buiten gewoon insigne op initiatief van Scouting Titus Brandsma uit Medemblik in samenwerking met DIVD en HackShield (het insigne is te bestellen via de ScoutShop).

  Het doel van het insigne is scouts digitaal weerbaar te maken. Hierbij wordt gebruik gemaakt van door Hack Shield beschikbaar gestelde tools.

eisen:
  - naam: Ontdek de digitale wereld
    eisen:
      - |
        Een digitale wereld vol kansen!
        a. Speel zelf de HackShield zone via joinhackshield.nl/scouting/hs (+-20 min) of met je groep de "Duik in de Digitale Wereld" Quest op joinhackshield.nl/scouting/duik (+-45 min)
        b. Leg uit wat een Cyber Agent is, en waarom dit goed bij scouting past.
        c. Noem 3 gevaren en 3 kansen van de digitale wereld.
      - |
        Laat je niet Phishen.
        a. Wat is Phishing?
        b. Speel het level "Phish Phish" in de HackShield Phishing Zone (joinhackshield.com/scouting/phishing) (+- 20min) of speel met je groep de "Laat je niet Phishen" quest (+-30min) op .....
        c. Benoem de 5 belangrijkste kenmerken van een Phishing bericht.
      - |
        Ontdek het digitale domein
        a. Cyber Security is een heel breed onderwerp. Bekijk de HackShield lessen om te ontdekken hoe breed dit veld is.
        b. Kies 2 of 3 lessen uit met onderwerpen waar je minder kennis van hebt en speel deze.
        c. Beschrijf wat je er van geleerd hebt.

  - naam: Samen en sociaal
    eisen:
      - |
        Hoe ga je met elkaar om online?
        a. Maak een lijstje van hoeveel mensen in jouw omgeving / in de groep, sociale media of berichten services (whatsapp, snapchat, signal) gebruiken.
        b. Vraag ze of ze wel eens nare dingen hebben gezien, of te horen hebben gekregen.
        c. Welke informatie delen ze wel en welke informatie delen ze niet online?
        d. Bespreek wat je op valt aan je lijst?
        e. Speel samen met je groep de "Zoek de gemene deler" quest via joinhackshield.nl/scouting/zoekdegemenedeler (+-30min)
      - |
        Wat weet de wereld van jou?
        a. Leg uit wat "persoonlijke informatie" is.
        b. Leg het verschil uit tussen openbaar en privé.
        c. Maak een lijst met welke informatie veilig is om met iedereen (openbaar) te delen en met informatie die je beter voor jezelf kunt houden (privé)?
        d. Check en verbeter je privacy-instellingen op whatsapp, signal en je social media, of die van een ander! Wat werd er onbewust met de wereld gedeeld?
      - |
        De jeugd is de toekomst.
        a. Begeleid of help een (groep) scout(s) bij het halen van dit insigne op niveau 1, 2 of 3.

  - naam: Veilig en verantwoord
    eisen:
      - |
        Wat is een veilig wachtwoord?
        a. Wat maakt een wachtwoord veilig?
        b. Speel eventueel individueel of in koppels het level "IJzersterk Wachtwoord" in de HackShield Wachtwoorden Zone (joinhackshield.com/scouting/ww)
        c. Benoem de 4 regels waar een sterk wachtwoord aan voldoet.
      - |
        Hacker de Hack?
        a. Leg uit wat een Hacker is.
        b. Leg uit wat de verschillende type Hackers zijn. (black-hat, white-hat en grey-hat)
        c. Speel samen met je groep de "Ruimte voor Hackers" quest via joinhackshield.nl/scouting/ruimtevoorhackers (+- 45min)
        d. Hoe kun jij je beschermen tegen hackers? Noem 3 manieren.

        --- Of ---

        Nep Nieuws
        a. Leg uit wat Nep nieuws is.
        b. Leg het verschil uit tussen des- en de-informatie.
        c. Ga naar een aangesloten bibliotheek in de buurt en speel de HackShield BiebQuest.
        d. Hoe herken je nep nieuws?
      - |
        Veilig Thuis / Veilig bij Scouting
        a. Maak een overzicht van jou "digitale veiligheid" thuis of bij je groep. Denk aan; wachtwoorden, bv van je router/internet. Welke staat er NU online ter beschikking over jullie? Weet iedereen in je huishouden wat ze moeten doen als ze een phishing bericht krijgen? Hebben jullie een gezamelijk "veiligheids-woord" om communicatie te controleren?
        b. Waar zie je mogelijkheden voor verbeteringen in de digitale veiligheid thuis of bij je groep? Zie je gaten in - of problemen met – de digitale veiligheid?
        c. Maak een plan om de verbeteringen door te voeren en gaten/problemen op te lossen.
        d. Maak een stappen plan die andere kunnen volgen om hun veiligheid thuis te vergroten. En deel deze.

        --- Of ---

        Hoe gaan WIJ met elkaar om?
        Elke scouting groep zou regels moeten hebben over Social Media gebruiken en de omgang met persoonlijke informatie.
        a. Probeer deze informatie van jou vereniging te vinden.
        b. Begrijp je wat er staat? Ben je het er mee eens?
        c. Breng de regels up-to-date.

  - naam: Creatief en duurzaam
    eisen:
      - |
        Afspraken poster.
        a. Maak samen met je gezin, groep of klas afspraken over hoe je met elkaar omgaat online en op sociale media. Wat doe of zeg je wel of juist niet.
        b. Knutsel een poster, met gerecycelde materialen die je thuis, in de klas, of bij je groep kan ophangen.
      - |
        Money Muling
        a. Wat is een Money Mule?
        b. Wat moet je doen als je slachtoffer bent geworden van money muling?
        c. Speel met je groep de HackShield "Uitlenen kost Geld" quest via joinhackshield.com/scouting/uitlenenkostgeld (+-40 min)
        d. Knutsel een poster, met gerecycelde materialen die je thuis, in de klas, of bij je groep kan ophangen om andere te leren over Money Muling.

        --- Of ---

        Nep nieuws is overal.
        a. Wat is nep nieuws en hoe herken je het?
        b. Speel met je groep de HackShield "Desinformatie" quest via joinhackshield.com/scouting/desinformatie (+-45min)
        c. Knutsel een poster, met gerecycelde materialen die je thuis, in de klas, of bij je groep kan ophangen om andere te leren over nep nieuws.
      - |
        Wet en Belofte
        Scouting kent de wet en de belofte als omgangsregels voor scouts.
        a. Maak een versie van de wet en belofte die betrekking heeft op de digitale wereld en hoe je met elkaar om gaat op Sociale Media en online.
        b. Geef dit vorm met behulp van digitaal media (blog, vlog, website, etc), dus zonder daarbij fysieke materialen te gebruiken.
        c. Presenteer en bespreek met je groep.

  - naam: Samen sterker!
    eisen:
      - |
        Samen sta je sterker!
        Als scout willen we de wereld samen meer leefbaar maken. Als Cyber Agent is het nu aan jouw om wat je geleerd hebt te delen!
        a. Speel samen met een volwassene de HackShield Senioren zone op joinhackshield.com/scouting/seniorenzone.*

        * Het idee is om dit spel met iemand van buiten de Scouting te laten spelen om zo de kennis over digitale veiligheid te verspreiden en de wereld een beetje beter en veiliger te maken. Maar je kunt het natuurlijk ook met de leiding spelen!

        Wachtwoorden Check:
      - |
        Deze opdracht bouwt voort op opdracht 3 van nivo 1. Heb je deze nog niet gedaan, doe dat dan eerst.
        a. Leg aan minimaal 3 personen van buiten Scouting uit hoe ze een veilig wachtwoord kunnen maken. Gebruik bijvoorbeeld de wachtwoorden check op https://nl.joinhackshield.com/wachtwoordencheck
        b. Help ze daarna het wachtwoord (verantwoord) veiliger te maken.
      - |
        Organiseer en geef een gastles.
        a. Meld je aan als gast docent bij HackShield.
        b. Geef een van de HackShield gastlessen (https://nl.joinhackshield.com/classquests) op een basisschool bij jou in de buurt of een andere speltak.

