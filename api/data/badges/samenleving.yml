slug: samenleving
titel: Insigne Samenleving
introductie: |
  Dit insigne maakt deel uit van het activiteitengebied Samenleving.
  In dit activiteitengebied doe je activiteiten die te maken hebben met je eigen omgeving, het cultureel erfgoed en de
  maatschappij (maatschappelijke participatie). Met dit insigne kom je meer te weten over het culturele erfgoed van
  Scouting, over je eigen gemeente en hoe je iets kunt betekenen voor anderen in de samenleving. Bij Scouting hoort
  iedereen er bij!
eisen:
  - naam: Regels en rechten
    eisen:
      - |
        Niveau 1.
        Net als in de samenleving zijn er bij Scouting afspraken nodig om goed met elkaar te kunnen omgaan.
        a. Schrijf vijf dingen op die je volgens jou niet mag doen (verbodsafspraken), waarvan minimaal één verbod dat te maken heeft met duurzaamheid.
        b. Schrijf vijf regels op waarvan jij vindt dat iedereen zich eraan zou moeten houden (gebodsafspraken), waarvan minimaal één gebod te maken heeft met duurzaamheid.
        c. Maak voor elk verbod en gebod een passend (verkeers)bord en presenteer deze aan je speltak.
      - |
        Niveau 2.
        Alle kinderen en jongeren hebben rechten. Deze staan beschreven in het Kinderrechtenverdrag van de Verenigde Naties.
        a. Zoek op wat de internationale rechten van het kind zijn.
        b. Geef hierover een spreekbeurt op school of in je speltak en licht daarbij toe welk kinderrecht volgens jou het meest te maken heeft met een duurzame of diverse wereld.
        c. Leg uit welk kinderrecht jou het meeste aanspreekt en waarom. Sluit af met een quiz voor je publiek.
      - |
        Niveau 3.
        Ook bij Scouting hebben we met elkaar allerlei regels afgesproken, zowel over hoe we met elkaar omgaan als hoe de vereniging tot besluiten komt.
        a. Zoek op wat er in het huishoudelijk reglement van Scouting Nederland staat over de vertegenwoordiging van leden op groeps-, regio- en landelijk niveau.
        b. Neem (in overleg met je groepsbestuur) deel aan een regioraad van jouw regio, óf bezoek een vergadering van de landelijke raad van Scouting Nederland.
        c. Doe (mondeling) verslag van de belangrijkste punten en bespreek met je speltak wat jij het belangrijkst vindt en waarom.
  - naam: Een handje helpen
    eisen:
      - |
        Niveau 1.
        In de belofte staat dat je bereid bent 'iedereen te helpen waar je kan'.
        a. Doe een klusje van één à twee uur, waarmee je helpt om het clubhuis schoner of mooier te maken.
      - |
        Niveau 2.
        Een goede scout helpt anderen, ook buiten Scouting.
        a. Help minimaal één dagdeel mee als vrijwilliger voor een goed doel of bij een niet-Scoutingorganisatie. Kies bij voorkeur een organisatie die bijdraagt aan een duurzame samenleving.
        b. Na afloop vertel je aan je speltak wat je hebt gedaan en wat je ervan vond.
      - |
        Niveau 3.
        De samenleving wordt sterker als meer mensen bereid zijn elkaar te helpen.
        a. Help minimaal drie dagdelen mee als vrijwilliger bij een maatschappelijke organisatie buiten Scouting.
        b. Leg uit aan je speltak waar deze organisatie voor staat en wat hun maatschappelijke bijdrage is.
  - naam: Cultureel erfgoed van Scouting
    eisen:
      - |
        Niveau 1.
        Scouting heeft een rijke geschiedenis waarin verschillende mensen een belangrijke rol hebben gespeeld.
        a. Verdiep je in de geschiedenis van je Scoutinggroep en onderzoek welke mensen of gebeurtenissen een bijzondere rol hebben gespeeld in het ontstaan van de groep.
        b. Interview mensen die al lang bij je Scoutinggroep zijn en maak korte filmpjes voor je speltak.
      - |
        Niveau 2.
        Elk jaar op 22 februari vieren scouts over de hele wereld de gezamenlijke geboortedag van Lord en Lady Baden-Powell.
        a. Zoek uit wat de verschillen en overeenkomsten zijn tussen WOSM en WAGGGS en tussen 'Founders Day' en 'Thinking Day'.
        b. Organiseer een verjaardagsfeest voor Lord en Lady Baden-Powell rond het thema internationale vriendschap en 'de wereld een beetje beter achterlaten'.
      - |
        Niveau 3.
        Op 22 februari wordt vanuit WAGGGS 'World Thinking Day' (Denkdag) gevierd, waarin vriendschap en internationale verbondenheid centraal staan.
        a. Bestudeer het Denkdagactiviteitenpakket van WAGGGS en organiseer hiermee een opkomst voor je speltak (of een andere speltak).
        b. Het cultureel erfgoed van Scouting in Nederland wordt bewaard in het Scoutingmuseum. Bezoek het Nationaal Scoutingmuseum in Baarn of het Reizend Scoutingmuseum tijdens een landelijk evenement.
  - naam: Iedereen is welkom
    eisen:
      - |
        Niveau 1.
        Bij Scouting is iedereen welkom.
        a. Maak een poster tegen pesten.
        b. Laat de poster aan je speltak zien en leg uit waarom je het belangrijk vindt dat er niet gepest wordt.
        c. Hang de poster op in het clubhuis.
      - |
        Niveau 2.
        Ongeveer 13.000 mensen in Nederland zijn doof, waaronder ook veel kinderen.
        a. Maak een overzicht van het handalfabet van de Nederlandse Gebarentaal (NGT) en leer je eigen naam te gebaren. Zoek ook gebaren op om een korte zin mee te vormen.
      - |
        Niveau 3.
        Binnen Scouting zijn er meerdere groepen met speltakken voor scouts met een beperking. Voer eis a of b uit.
        a. Draai een opkomst mee bij een Scoutinggroep met een speltak voor scouts met een beperking en begeleid daarin minstens één activiteit.
        b. Ben je zelf lid van een speltak voor Scouts met een beperking? Nodig dan een speltak voor scouts zonder beperking uit om een keer een opkomst mee te draaien.
  - naam: Gemeente
    eisen:
      - |
        Niveau 1.
        Elke gemeente heeft een gemeentewapen waarin allerlei symbolen staan afgebeeld.
        a. Teken het wapen van jouw gemeente en zoek uit wat het betekent en wat de achtergrond ervan is.
      - |
        Niveau 2.
        In elke gemeente zijn er wel 'problemen' of uitdagingen waar de gemeente een oplossing voor probeert te vinden.
        a. Onderzoek welke problemen of uitdagingen er in de buurt van je clubhuis spelen.
        b. Bedenk hoe je daar met je speltak iets aan kunt doen en voer dit plan uit.
      - |
        Niveau 3.
        Participatie van jongeren in Scouting en in de gemeente is belangrijk, ook op het gebied van duurzaamheid.
        a. Zoek uit wat je gemeente doet op het gebied van duurzaamheid en welke rol jongeren daarbij kunnen spelen.
        b. Bedenk waar jij (samen met je speltak) inspraak op wil hebben en probeer dat ook te realiseren.
        c. Bezoek een vergadering van de gemeenteraad en ervaar hoe besluiten worden genomen.
