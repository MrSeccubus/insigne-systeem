slug: jaarinsigne_2025
titel: Jaarinsigne 2025 - Wijs met drinkwater
type: jaarinsigne
introductie: |
  Schoon drinkwater is een eerste levensbehoefte en draagt bij aan een gezond leven, gezonde voeding en gezonde natuur. Water uit de kraan is in Nederland zo schoon, dat je het zonder zorgen kunt drinken. De kwaliteit van ons drinkwater behoort tot de beste van de wereld. Met dit insigne leer je hoe bijzonder ons kraanwater eigenlijk is, waar het vandaan komt, waarom de natuur zo belangrijk is en waarom we er bewust mee om moeten gaan. Vers en veilig kraanwater. Het lijkt vanzelfsprekend, maar er gaat veel aan vooraf om het water schoon uit de kraan te laten komen.
