<!DOCTYPE html>
<html lang="nl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"></head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:system-ui,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:2rem 1rem;">
    <tr><td align="center">
      <table width="100%" style="max-width:520px;background:#fff;border-radius:4px;border:1px solid #ddd;border-top:3px solid #00A651;padding:2rem;">
        <tr><td>
          <h1 style="margin:0 0 1.5rem;font-size:1.4rem;color:#1a1a1a;">Bericht via contactformulier</h1>
          <p style="margin:0 0 0.5rem;color:#555;font-size:0.9rem;"><strong>Van:</strong> {{ sender_email }}</p>
          <p style="margin:0 0 1.5rem;color:#555;font-size:0.9rem;"><strong>Onderwerp:</strong> {{ subject }}</p>
          <div style="background:#f9f9f9;border:1px solid #eee;border-radius:4px;padding:1rem;margin:0 0 1.5rem;color:#333;line-height:1.6;white-space:pre-wrap;">{{ body }}</div>
          <p style="margin:0;color:#888;font-size:0.85rem;">
            Reageer rechtstreeks op dit bericht door te mailen naar {{ sender_email }}.
          </p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
