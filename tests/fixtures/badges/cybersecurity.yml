slug: cybersecurity
titel: Insigne Cybersecurity
introductie: |
  Het insigne Cyber Security is een buitengewoon insigne op initiatief van Scouting Titus Brandsma uit Medemblik in samenwerking met DIVD en HackShield.

  Het doel van het insigne is scouts digitaal weerbaar te maken.
eisen:
  - naam: Ontdek de digitale wereld
    eisen:
      - |
        Een digitale wereld vol kansen!
        a. Speel zelf de HackShield zone via joinhackshield.nl/scouting/hs.
        b. Leg uit wat een Cyber Agent is, en waarom dit goed bij scouting past.
        c. Noem 3 gevaren en 3 kansen van de digitale wereld.
      - |
        Laat je niet Phishen.
        a. Wat is Phishing?
        b. Speel het level "Phish Phish" in de HackShield Phishing Zone.
        c. Benoem de 5 belangrijkste kenmerken van een Phishing bericht.
      - |
        Ontdek het digitale domein.
        a. Bekijk de HackShield lessen om te ontdekken hoe breed dit veld is.
        b. Kies 2 of 3 lessen uit met onderwerpen waar je minder kennis van hebt.
        c. Beschrijf wat je er van geleerd hebt.
  - naam: Samen en sociaal
    eisen:
      - |
        Hoe ga je met elkaar om online?
        a. Maak een lijstje van hoeveel mensen in jouw omgeving sociale media gebruiken.
        b. Vraag ze of ze wel eens nare dingen hebben gezien.
        c. Bespreek wat je opvalt aan je lijst.
      - |
        Wat weet de wereld van jou?
        a. Leg uit wat "persoonlijke informatie" is.
        b. Leg het verschil uit tussen openbaar en privé.
        c. Check en verbeter je privacy-instellingen.
      - |
        De jeugd is de toekomst.
        a. Begeleid of help een scout bij het halen van dit insigne op niveau 1, 2 of 3.
        b. Reflecteer op wat je hebt geleerd van het begeleiden.
        c. Schrijf een kort verslag van de begeleiding.
  - naam: Veilig en verantwoord
    eisen:
      - |
        Wat is een veilig wachtwoord?
        a. Wat maakt een wachtwoord veilig?
        b. Speel het level "IJzersterk Wachtwoord" in de HackShield Wachtwoorden Zone.
        c. Benoem de 4 regels waar een sterk wachtwoord aan voldoet.
      - |
        Hacker de Hack?
        a. Leg uit wat een Hacker is.
        b. Leg uit wat de verschillende type Hackers zijn.
        c. Hoe kun jij je beschermen tegen hackers? Noem 3 manieren.
      - |
        Veilig Thuis.
        a. Maak een overzicht van jouw digitale veiligheid thuis.
        b. Waar zie je mogelijkheden voor verbeteringen?
        c. Maak een plan om de verbeteringen door te voeren.
  - naam: Creatief en duurzaam
    eisen:
      - |
        Afspraken poster.
        a. Maak samen afspraken over hoe je met elkaar omgaat online.
        b. Knutsel een poster met gerecyclede materialen.
        c. Hang de poster op bij je groep.
      - |
        Money Muling.
        a. Wat is een Money Mule?
        b. Wat moet je doen als je slachtoffer bent geworden van money muling?
        c. Knutsel een poster om anderen te leren over Money Muling.
      - |
        Wet en Belofte.
        a. Maak een versie van de wet en belofte voor de digitale wereld.
        b. Geef dit vorm met behulp van digitale media.
        c. Presenteer en bespreek met je groep.
  - naam: Samen sterker!
    eisen:
      - |
        Samen sta je sterker!
        a. Speel samen met een volwassene de HackShield Senioren zone.
        b. Bespreek wat jullie hebben geleerd.
        c. Deel drie tips voor digitale veiligheid met je omgeving.
      - |
        Wachtwoorden check.
        a. Leg aan minimaal 3 personen uit hoe ze een veilig wachtwoord kunnen maken.
        b. Help ze daarna het wachtwoord veiliger te maken.
        c. Evalueer hoe de gesprekken verliepen.
      - |
        Organiseer en geef een gastles.
        a. Meld je aan als gastdocent bij HackShield.
        b. Geef een van de HackShield gastlessen op een basisschool.
        c. Reflecteer op de les: wat ging goed, wat zou je verbeteren?
nawoord: |
  Toelichting Insigne Cyber Security.

  Met dit insigne heb je laten zien dat je digitaal vaardig en bewust bent. Deel je kennis met anderen en maak de digitale wereld een beetje veiliger.
