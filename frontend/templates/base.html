<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Insigne Systeem{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
</head>
<body>
    <header class="site-header">
        <a class="site-title" href="/">Insigne Systeem</a>
        <nav class="site-nav">
            {% if current_user %}
                <a href="/" class="nav-username">{{ current_user.name }}</a>
                <a href="/signoff-requests">Aftekeningen</a>
                <a href="/profile">Mijn profiel</a>
                <form method="post" action="/logout" class="nav-logout-form">
                    <button type="submit">Uitloggen</button>
                </form>
            {% else %}
                <a href="/login">Inloggen</a>
                <a href="/register">Registreren</a>
            {% endif %}
        </nav>
    </header>
    {% block content %}{% endblock %}
</body>
</html>
